<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Evirma Club</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0B;
    --bg2: #131316;
    --bg3: #1C1C21;
    --bg4: #26262D;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #F5F5F7;
    --text2: #8A8A95;
    --text3: #55555F;
    --accent: #FF6B2C;
    --accent-hover: #FF854D;
    --accent-dim: rgba(255,107,44,0.12);
    --accent-border: rgba(255,107,44,0.3);
    --green: #3DD68C;
    --green-dim: rgba(61,214,140,0.12);
    --red: #FF5B5B;
    --yellow: #F5B82E;
    --yellow-dim: rgba(245,184,46,0.12);
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #root { min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* ===== AUTH ===== */
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 800px 600px at 50% 0%, rgba(255,107,44,0.08), transparent 70%),
      radial-gradient(ellipse 600px 400px at 20% 100%, rgba(255,107,44,0.04), transparent 70%),
      var(--bg);
  }
  .auth-wrap::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
  }
  .auth-card {
    background: rgba(19,19,22,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 2.5rem 2.25rem;
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .auth-logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 2rem;
  }
  .logo-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 26px; height: 26px; }
  .logo-text-wrap { display: flex; flex-direction: column; line-height: 1; }
  .logo-text-sm { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 2px; margin-bottom: 4px; }
  .logo-text-lg { font-size: 18px; font-weight: 900; letter-spacing: 0.5px; }
  .logo-text-lg span { color: var(--accent); }

  .auth-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.6px;
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }
  .auth-sub {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 2rem;
    line-height: 1.55;
  }
  .tg-button {
    width: 100%;
    background: var(--accent);
    color: white;
    border-radius: 14px;
    padding: 1rem 1.25rem;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    box-shadow: 0 8px 24px rgba(255,107,44,0.25);
  }
  .tg-button:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 12px 32px rgba(255,107,44,0.35); }
  .tg-button:active { transform: translateY(0); }
  .tg-button svg { width: 20px; height: 20px; fill: white; }

  .auth-note {
    margin-top: 1.5rem;
    padding: 1rem;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .auth-note-icon {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    color: var(--accent);
    margin-top: 1px;
  }
  .auth-note-text { font-size: 12px; color: var(--text2); line-height: 1.5; }

  .auth-features {
    display: flex;
    justify-content: space-between;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .auth-feat { text-align: center; flex: 1; }
  .auth-feat-num { font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -0.3px; }
  .auth-feat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-top: 2px; }

  /* ===== APP LAYOUT ===== */
  .app {
    display: flex;
    min-height: 100vh;
    background: var(--bg);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .sidebar-head {
    padding: 1.5rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-logo .logo-icon { width: 38px; height: 38px; border-radius: 10px; }
  .sidebar-logo .logo-icon svg { width: 22px; height: 22px; }
  .sidebar-logo-name {
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.3px;
    line-height: 1.1;
  }
  .sidebar-logo-name span { color: var(--accent); }
  .sidebar-logo-sub { font-size: 9px; color: var(--text3); letter-spacing: 1.5px; font-weight: 700; }

  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; overflow-y: auto; }
  .sidebar-section-title {
    font-size: 10px;
    font-weight: 800;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 0.75rem 0.75rem 0.5rem;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.7rem 0.85rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 2px;
    width: 100%;
    text-align: left;
    position: relative;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: -12px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-item .nav-badge {
    margin-left: auto;
    background: var(--bg4);
    color: var(--text2);
    font-size: 10px;
    font-weight: 800;
    border-radius: 6px;
    padding: 2px 7px;
  }
  .nav-item.active .nav-badge { background: var(--accent); color: white; }

  .sidebar-user {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #FF9960);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
    overflow: hidden;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); font-weight: 600; }
  .logout-btn {
    color: var(--text3);
    padding: 6px;
    border-radius: 8px;
    transition: all 0.15s;
  }
  .logout-btn:hover { color: var(--red); background: rgba(255,91,91,0.1); }
  .logout-btn svg { width: 16px; height: 16px; display: block; }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .topbar {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    flex-shrink: 0;
    background: rgba(10,10,11,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-left { min-width: 0; }
  .topbar-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .topbar-sub { font-size: 12px; color: var(--text2); margin-top: 2px; font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.55rem 0.9rem;
    width: 280px;
    transition: border-color 0.15s;
  }
  .search-box:focus-within { border-color: var(--border2); }
  .search-box svg { width: 15px; height: 15px; color: var(--text3); flex-shrink: 0; }
  .search-box input {
    flex: 1;
    min-width: 0;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
  }
  .search-box input::placeholder { color: var(--text3); }

  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    position: relative;
  }
  .icon-btn:hover { background: var(--bg4); border-color: var(--border2); }
  .icon-btn svg { width: 16px; height: 16px; color: var(--text); }
  .icon-btn-dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid var(--bg3);
  }

  .content {
    flex: 1;
    padding: 2rem;
    overflow-y: auto;
    max-width: 100%;
  }
  .content-wide { max-width: 1400px; margin: 0 auto; }

  /* ===== DASHBOARD ===== */
  .hero-card {
    background:
      radial-gradient(ellipse 600px 300px at 100% 0%, rgba(255,107,44,0.18), transparent 60%),
      linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2rem 2.25rem;
    position: relative;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .hero-greeting { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
  .hero-title { font-size: 28px; font-weight: 900; letter-spacing: -0.7px; margin-bottom: 0.75rem; line-height: 1.15; }
  .hero-title span { color: var(--accent); }
  .hero-desc { font-size: 14px; color: var(--text2); max-width: 520px; margin-bottom: 1.5rem; line-height: 1.6; }
  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    transition: all 0.15s;
  }
  .hero-cta:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .hero-cta svg { width: 14px; height: 14px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem 1.4rem;
    transition: all 0.15s;
  }
  .stat-card:hover { border-color: var(--border2); }
  .stat-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .stat-label { font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
  .stat-icon-box { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .stat-icon-box svg { width: 16px; height: 16px; }
  .stat-icon-orange { background: var(--accent-dim); color: var(--accent); }
  .stat-icon-green { background: var(--green-dim); color: var(--green); }
  .stat-icon-blue { background: rgba(91,140,255,0.12); color: #5B8CFF; }
  .stat-icon-yellow { background: var(--yellow-dim); color: var(--yellow); }
  .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
  .stat-trend { font-size: 11px; color: var(--green); font-weight: 700; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .stat-trend svg { width: 11px; height: 11px; }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-title {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .section-link {
    font-size: 12px;
    color: var(--text2);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
  }
  .section-link:hover { color: var(--accent); }
  .section-link svg { width: 13px; height: 13px; }

  /* ===== MODULE CARDS ===== */
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .module-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .module-card:hover {
    border-color: var(--accent-border);
    background: var(--bg3);
    transform: translateY(-2px);
  }
  .module-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 100% 0%, rgba(255,107,44,0.08), transparent 50%);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .module-card:hover::before { opacity: 1; }
  .module-icon {
    width: 42px;
    height: 42px;
    border-radius: 11px;
    background: var(--accent-dim);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    position: relative;
    z-index: 1;
  }
  .module-icon svg { width: 20px; height: 20px; }
  .module-name { font-size: 14px; font-weight: 800; margin-bottom: 4px; position: relative; z-index: 1; letter-spacing: -0.2px; }
  .module-count { font-size: 12px; color: var(--text2); font-weight: 600; position: relative; z-index: 1; }
  .module-progress-bar {
    margin-top: 0.85rem;
    height: 3px;
    background: var(--bg4);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .module-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* ===== LESSON LIST ===== */
  .lessons-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .lesson-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .lesson-card:hover {
    border-color: var(--border2);
    background: var(--bg3);
    transform: translateX(4px);
  }
  .lesson-thumb {
    width: 80px;
    height: 52px;
    border-radius: 9px;
    background: linear-gradient(135deg, #2a1a10, #1a0f05);
    border: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .lesson-thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 9px;
  }
  .lesson-thumb::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 40%, rgba(255,107,44,0.2), transparent 60%);
    z-index: 1;
  }
  .lesson-thumb svg {
    width: 18px;
    height: 18px;
    color: rgba(255,255,255,0.85);
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .lesson-thumb-duration {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: rgba(0,0,0,0.75);
    color: white;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 4px;
    z-index: 1;
  }
  .lesson-info { flex: 1; min-width: 0; }
  .lesson-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.2px;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lesson-meta {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lesson-meta-dot { color: var(--text3); }
  .lesson-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 7px;
    flex-shrink: 0;
  }
  .lesson-status svg { width: 11px; height: 11px; }
  .lesson-status.done { background: var(--green-dim); color: var(--green); }
  .lesson-status.new { background: var(--accent-dim); color: var(--accent); }

  /* ===== LESSON PLAYER PAGE ===== */
  .player-wrap { max-width: 980px; margin: 0 auto; }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 1.5rem;
    transition: color 0.15s;
    padding: 0.4rem 0;
  }
  .back-btn:hover { color: var(--text); }
  .back-btn svg { width: 15px; height: 15px; }

  .video-container {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    aspect-ratio: 16/9;
    position: relative;
    margin-bottom: 1.5rem;
  }
  .video-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background:
      radial-gradient(ellipse at center, rgba(255,107,44,0.15), transparent 60%),
      linear-gradient(135deg, #1a0f08, #0a0605);
  }
  .video-play-btn {
    width: 76px;
    height: 76px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 12px 40px rgba(255,107,44,0.4);
  }
  .video-play-btn:hover { transform: scale(1.08); }
  .video-play-btn svg { width: 28px; height: 28px; fill: white; margin-left: 4px; }
  .video-placeholder-label {
    font-size: 13px;
    color: var(--text2);
    font-weight: 600;
    padding: 6px 14px;
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    border: 1px solid var(--border2);
  }

  .player-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .player-title-block { flex: 1; min-width: 0; }
  .player-module-tag {
    display: inline-block;
    font-size: 11px;

  .lesson-nav-label { font-size: 10px; color: var(--text3); font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
  .lesson-nav-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ===== FILTERS ===== */

  /* ===== STUDENTS GRID ===== */

    border-radius: 5px;

    font-size: 15px;

    font-size: 18px;
    font-weight: 900;

    margin-bottom: 6px;

  .student-city {
    font-size: 12px;
    color: var(--text2);

    align-items: center;
    justify-content: center;
    gap: 4px;

  /* старые классы для совместимости */
  .student-head { display: none; }
  .student-details { display: none; }
  .student-head-info { display: none; }
  .student-detail-row { display: none; }

  /* ===== CONTRACTORS ===== */

    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.55rem 0.95rem;
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;

  .cat-chip:hover { border-color: var(--border2); color: var(--text); }
  .cat-chip.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

  .contractors-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }
  .contractor-card {
    background: var(--bg2);

  .contractor-category {
    display: inline-block;
    font-size: 10px;

  .contractor-promo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, var(--accent-dim), rgba(255,107,44,0.04));

  .contractor-promo-code { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: 0.3px; font-family: 'JetBrains Mono', monospace; }
  .contractor-promo-btn {
    background: var(--accent);
    color: white;
    padding: 6px 12px;
    border-radius: 7px;
    font-size: 11px;
    font-weight: 800;
    transition: all 0.15s;
  }
  .contractor-promo-btn:hover { background: var(--accent-hover); }

  /* contractor redesign */
  .contractor-card {
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .contractor-card:hover { border-color: var(--accent-border); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
  .contractor-name { font-size: 17px; }

  .contractor-rating { font-size: 14px; }
  .contractor-stars-row { display: flex; gap: 3px; align-items: center; margin: 4px 0 0; }
  .contractor-star-btn { background: none; border: none; padding: 2px; cursor: pointer; color: var(--border2); transition: color 0.1s; font-size: 18px; line-height: 1; }
  .contractor-star-btn.filled { color: var(--yellow); }
  .contractor-star-btn:hover { color: var(--yellow); }

  /* contractor modal */
  .contractor-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 1rem;
    animation: fadeIn 0.15s ease;
  }
  .contractor-modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 20px; padding: 2rem; max-width: 520px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.2s ease;

  .contractor-modal-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 6px; }
  .contractor-modal-text { font-size: 15px; color: var(--text2); line-height: 1.65; white-space: pre-wrap; }
  .contractor-modal-rating-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .contractor-modal-avg { font-size: 28px; font-weight: 900; color: var(--yellow); letter-spacing: -1px; }
  .contractor-modal-cnt { font-size: 13px; color: var(--text-dim); }
  .contractor-modal-my-label { font-size: 13px; color: var(--text2); margin-top: 10px; margin-bottom: 6px; }
  .contractor-modal-stars { display: flex; gap: 4px; }
  .contractor-modal-star { background: none; border: none; cursor: pointer; font-size: 28px; color: var(--border2); transition: color 0.1s; padding: 2px; }
  .contractor-modal-star.filled { color: var(--yellow); }
  .contractor-modal-star:hover { color: var(--yellow); }

  /* ===== PROFILE PAGE ===== */
  .profile-wrap { max-width: 980px; margin: 0 auto; }
  .profile-header {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .profile-header::before {
    content: '';
    position: absolute;
    top: -50%;

    font-weight: 800;

    z-index: 1;

  .profile-name { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }

    display: inline-flex;
    align-items: center;

    text-transform: uppercase;

  .profile-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);

    font-family: inherit;
    box-sizing: border-box;
    transition: border-color 0.15s;

  .profile-input option { background: var(--bg2); }

  .profile-edit-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 0.7rem 1.1rem;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;

    align-items: center;
    gap: 8px;

  .profile-edit-btn svg { width: 13px; height: 13px; }

  .profile-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1.25rem;
  }
  .profile-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }
  .profile-card-title {
    font-size: 14px;
    font-weight: 800;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 1.25rem;
  }
  .profile-fields { display: flex; flex-direction: column; gap: 1rem; }
  .profile-field { display: flex; justify-content: space-between; gap: 1rem; align-items: flex-start; }
  .profile-field-label { font-size: 13px; color: var(--text2); font-weight: 600; flex-shrink: 0; }
  .profile-field-value { font-size: 15px; color: var(--text); font-weight: 700; text-align: right; }

  .subscription-card {
    background: linear-gradient(135deg, var(--accent-dim), rgba(255,107,44,0.04));
    border: 1px solid var(--accent-border);
    border-radius: 16px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .sub-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 800;
    color: var(--green);
    background: var(--green-dim);

    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 1rem;

  .sub-days-label { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 1.25rem; }
  .sub-dates { display: flex; justify-content: space-between; padding-top: 1rem; border-top: 1px solid var(--accent-border); margin-bottom: 1.25rem; font-size: 11px; }
  .sub-date { display: flex; flex-direction: column; gap: 2px; }

    margin-bottom: 1.5rem;
  }
  .admin-stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.25rem;
  }
  .admin-stat-label {
    font-size: 10px;
    font-weight: 800;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .admin-stat-value {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.4px;
  }
  .admin-stat-value.accent { color: var(--accent); }

  @media (max-width: 768px) {
    .admin-table-head { display: none; }
    .admin-row {
      grid-template-columns: 28px 64px 1fr;
      gap: 0.75rem;
      padding: 1rem;
      align-items: start;
    }
    .admin-row-meta-mobile {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--text2);
      font-weight: 600;
      margin-top: 4px;
    }
    .admin-row > .admin-row-duration, .admin-row > .admin-row-date { display: none; }
    .admin-row > .admin-module-select { grid-column: 3; margin-top: 6px; }
    .admin-toolbar { flex-direction: column; align-items: stretch; }
    .role-switcher { bottom: 12px; right: 12px; }
    .role-switcher button { padding: 0.45rem 0.7rem; font-size: 11px; }
  }
  @media (min-width: 769px) {
    .admin-row-meta-mobile { display: none; }
  }

  /* ===== PAGINATION & RESULTS ===== */
  .results-bar {
    font-size: 12px;
    color: var(--text2);
    font-weight: 600;
    margin-bottom: 1rem;
    padding: 0 0.25rem;
  }
  .results-bar strong { color: var(--text); font-weight: 800; }
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-top: 2rem;
    padding: 1rem;
  }
  .page-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 11px;
    padding: 0.7rem 1.1rem;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    transition: all 0.15s;
  }
  .page-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: white; }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-btn svg { width: 14px; height: 14px; }
  .page-info { font-size: 13px; color: var(--text2); font-weight: 600; }
  .page-info strong { color: var(--accent); font-weight: 800; }

  .student-detail-multiline { align-items: flex-start !important; }
  .student-detail-multiline span {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.45;
  }
  .student-detail-multiline svg { margin-top: 3px; }
  .student-tg-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .student-tg-btn[disabled]:hover { background: var(--bg3); border-color: var(--border2); color: var(--text); }

  /* ===== MODAL ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: modalIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 1;
  }
  .modal-close:hover { background: var(--bg4); color: var(--text); }
  .modal-close svg { width: 16px; height: 16px; }
  .modal-hero {
    padding: 2.5rem 2rem 1.5rem;
    background:
      radial-gradient(ellipse 400px 200px at 50% 0%, rgba(255,107,44,0.15), transparent 70%),
      var(--bg2);
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .modal-avatar {
    width: 88px;
    height: 88px;
    border-radius: 24px;
    background: linear-gradient(135deg, var(--accent), #FF9960);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 900;
    color: white;
    margin: 0 auto 1rem;
    box-shadow: 0 12px 32px rgba(255,107,44,0.3);
  }
  .modal-name {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .modal-handle {
    font-size: 13px;
    color: var(--text2);
    font-weight: 600;
    margin-bottom: 1rem;
  }
  .modal-tags {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .modal-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 800;
    padding: 5px 10px;
    border-radius: 7px;
    background: var(--bg3);
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .modal-tag.accent { background: var(--accent-dim); color: var(--accent); }
  .modal-tag svg { width: 11px; height: 11px; }
  .modal-body {
    padding: 1.5rem 2rem;
  }
  .modal-section {
    margin-bottom: 1.5rem;
  }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section-title {
    font-size: 11px;
    font-weight: 800;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .modal-section-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    font-weight: 500;
  }
  .modal-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .modal-info-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 0.85rem 1rem;
  }
  .modal-info-label {
    font-size: 10px;
    color: var(--text3);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .modal-info-label svg { width: 11px; height: 11px; }
  .modal-info-value {
    font-size: 13px;
    color: var(--text);
    font-weight: 700;
  }
  .modal-footer {
    padding: 1.25rem 2rem 1.75rem;
    border-top: 1px solid var(--border);
    background: var(--bg);
    border-radius: 0 0 20px 20px;
  }
  .modal-tg-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border-radius: 12px;
    padding: 0.95rem;
    font-size: 14px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.15s;
    text-decoration: none;
  }
  .modal-tg-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,107,44,0.3); }
  .modal-tg-btn svg { width: 16px; height: 16px; }
  .modal-tg-btn.disabled {
    background: var(--bg3);
    color: var(--text3);
    cursor: not-allowed;
    border: 1px solid var(--border);
  }
  .modal-tg-btn.disabled:hover { transform: none; box-shadow: none; }

  @media (max-width: 600px) {
    .modal-backdrop { padding: 1rem 0.75rem; align-items: flex-end; }
    .modal { max-height: 92vh; border-radius: 20px 20px 0 0; }
    .modal-hero { padding: 2rem 1.5rem 1.25rem; }
    .modal-body { padding: 1.25rem 1.5rem; }
    .modal-footer { padding: 1rem 1.5rem 1.5rem; }
    .modal-name { font-size: 20px; }
    .modal-info-grid { grid-template-columns: 1fr; gap: 0.5rem; }
    .modal-avatar { width: 72px; height: 72px; font-size: 26px; }
  }

  .student-card { cursor: pointer; }

  /* ===== POLISH: smoother card interactions ===== */
  .student-card {
    transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.18s, background 0.18s, box-shadow 0.18s;
  }
  .student-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25), 0 0 0 1px var(--accent-border);
  }
  .student-card:active { transform: translateY(-1px); }

  .module-card {
    transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.18s, background 0.18s, box-shadow 0.18s;
  }
  .module-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }

  .lesson-card {
    transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.18s, background 0.18s;
  }

  .contractor-card {
    transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.18s, box-shadow 0.18s;
  }
  .contractor-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }

  /* Subtle pulse on accent badges */
  .sub-status::before {
    animation: pulseGreen 2s ease-in-out infinite;
  }
  @keyframes pulseGreen {
    0%, 100% { box-shadow: 0 0 8px var(--green); }
    50% { box-shadow: 0 0 14px var(--green), 0 0 0 4px rgba(61,214,140,0.15); }
  }

  /* Smoother filter chip transitions */
  .filter-chip, .cat-chip {
    transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .filter-chip:active, .cat-chip:active { transform: scale(0.96); }

  /* Avatar inner glow on hover */
  .student-avatar {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
  }
  .student-card:hover .student-avatar {
    transform: scale(1.06);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  /* Module icon: subtle scale on card hover */
  .module-icon {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .module-card:hover .module-icon {
    transform: scale(1.08) rotate(-3deg);
  }

  /* Stat card subtle glow */
  .stat-card {
    transition: border-color 0.18s, background 0.18s;
  }
  .stat-card:hover {
    border-color: var(--border2);
    background: var(--bg3);
  }

  /* Cleaner focus outlines for inputs */
  input:focus, select:focus, textarea:focus { outline: none; }

  /* Lesson thumbnail hover */
  .lesson-thumb {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .lesson-card:hover .lesson-thumb { transform: scale(1.05); }
</style>

// ===== API LAYER =====
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3000'
  : '';  // на VPS API и фронт на одном домене

const SESSION_KEY = 'evirma_session_v1';

function getToken() {
  try { return localStorage.getItem(SESSION_KEY); } catch { return null; }
}
function setToken(t) {
  try { localStorage.setItem(SESSION_KEY, t); } catch {}
}
function clearToken() {
  try { localStorage.removeItem(SESSION_KEY); } catch {}
}

async function apiCall(method, path, body) {
  const opts = {
    method,

// Mutable runtime data — initializes from defaults, gets overlaid with admin edits from localStorage
let MODULES = DEFAULT_MODULES.map(m => ({ ...m }));
let LESSONS = [
  ...DEFAULT_LESSONS.map(l => {
    const override = _stored.lessons?.[l.id];
    return override ? { ...l, ...override } : { ...l };
  }),
  ...(_stored.extraLessons || [])
];
// Recompute module counts after overrides applied
function recomputeModuleCounts() {
  MODULES = MODULES.map(m => {
    const items = LESSONS.filter(l => l.moduleId === m.id);
    return { ...m, total: items.length, done: items.filter(l => l.done).length };
  });
}
recomputeModuleCounts();

function persistAdminChanges() {
  const lessonOverrides = {};
  const extraLessons = [];
  LESSONS.forEach((l) => {
    const def = DEFAULT_LESSONS.find(d => d.id === l.id);
    if (!def) {
      // Newly added lesson — store in full
      extraLessons.push(l);
      return;
    }
    const diff = {};
    if (l.moduleId !== def.moduleId) diff.moduleId = l.moduleId;
    if (l.title !== def.title) diff.title = l.title;
    if (l.description !== undefined && l.description !== (def.description||'')) diff.description = l.description;
    if (l.files && l.files.length > 0) diff.files = l.files;
    if (Object.keys(diff).length) lessonOverrides[l.id] = diff;
  });
  saveStorage({ lessons: lessonOverrides, extraLessons });
}

      setLoading(true); setError(null);
      try {
        const res = await api.post('/api/auth/telegram', tgUser);
        if (res.ok) { setToken(res.session); onLogin(res.user); }
      } catch(e) {
        if (e.status === 403 && e.message === 'device_limit') {
          setError('device_limit');
        } else if (e.status === 403) {
          setError('Нет активной подписки. Продли в боте @evirmaclub_bot');

// ===== KNOWLEDGE BASE =====
function KnowledgeBase({ onLessonClick }) {
  const [activeModule, setActiveModule] = useState('all');
  const [search, setSearch] = useState('');
  const [sortOrder, setSortOrder] = useState('newest');

  // Мини-курсы (подразделы) — слаги начинаются с kurs-
  const subModules  = MODULES.filter(m => m.id.startsWith('kurs-'));
  const mainModules = MODULES.filter(m => !m.id.startsWith('kurs-'));

  // Для карточки «Мини-курсы» считаем уроки из всех kurs-* подразделов
  const subIds        = subModules.map(m => m.id);
  const miniTotal     = LESSONS.filter(l => subIds.includes(l.moduleId)).length;
  const miniDone      = LESSONS.filter(l => subIds.includes(l.moduleId) && l.done).length;

  function parseDate(d) {
    if (!d) return 0;
    const p = d.split('.');
    if (p.length === 3) return new Date(p[2], p[1]-1, p[0]).getTime();
    return 0;
  }

  const isMiniKurs  = activeModule === 'mini-kursy';
  const showingAll  = activeModule === 'all' && !search;

  const filteredLessons = LESSONS
    .filter(l => {
      if (activeModule === 'all') return true;
      if (isMiniKurs) return subIds.includes(l.moduleId);
      return l.moduleId === activeModule;
    })
    .filter(l => !search || l.title.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => sortOrder === 'newest' ? parseDate(b.date) - parseDate(a.date) : parseDate(a.date) - parseDate(b.date));

  // Карточка одного урока
  function LessonCard({ lesson }) {
    const mod = MODULES.find(m => m.id === lesson.moduleId);
    return h('div', { className: 'lesson-card', onClick: () => onLessonClick(lesson) },
      h('div', { className: 'lesson-thumb' },
        lesson.embed_url && h('img', { src: lesson.poster_url, loading:'lazy', onError: e => { e.target.style.display='none'; } }),
        h(Icon.play),
        h('div', { className: 'lesson-thumb-duration' }, lesson.duration)
      ),
      h('div', { className: 'lesson-info' },
        h('div', { className: 'lesson-title' }, lesson.title),
        h('div', { className: 'lesson-meta' },
          !isMiniKurs && h('span', null, mod?.title),
          !isMiniKurs && h('span', { className: 'lesson-meta-dot' }, '•'),
          h('span', null, lesson.duration),
          lesson.date && h('span', { className: 'lesson-meta-dot' }, '•'),
          lesson.date && h('span', null, lesson.date),
          lesson.files && lesson.files.length > 0 && h('span', { className: 'lesson-meta-dot' }, '•'),
          lesson.files && lesson.files.length > 0 && h('span', { style:{color:'var(--accent)'} }, '📎 ' + lesson.files.length + ' файл' + (lesson.files.length === 1 ? '' : lesson.files.length < 5 ? 'а' : 'ов'))
        )
      ),
      lesson.done
        ? h('div', { className: 'lesson-status done' }, h(Icon.check), 'Просмотрено')
        : lesson.isNew ? h('div', { className: 'lesson-status new' }, 'Новое') : null
    );
  }

  return h('div', { className: 'content-wide' },

    // ===== Сетка модулей (только 7 основных) =====
    h('div', { className: 'modules-grid' },
      ...mainModules.map(mod => {
        const isMini    = mod.id === 'mini-kursy';
        const total     = isMini ? miniTotal : mod.total;
        const done      = isMini ? miniDone  : mod.done;
        const isActive  = mod.id === activeModule;
        return h('div', {
          key: mod.id,
          className: 'module-card',
          onClick: () => { setActiveModule(mod.id === activeModule ? 'all' : mod.id); setSearch(''); },
          style: isActive ? { borderColor: 'var(--accent-border)', background: 'var(--bg3)' } : {}
        },
          h('div', { className: 'module-icon', style: moduleIconStyle(mod.id) }, h(Icon[mod.icon])),
          h('div', { className: 'module-name' }, mod.title),
          h('div', { className: 'module-count' }, done + ' из ' + total + ' уроков'),
          h('div', { className: 'module-progress-bar' },
            h('div', { className: 'module-progress-fill', style: { width: total ? Math.round((done / total) * 100) + '%' : '0%' } })
          )
        );
      })
    ),

    // ===== Поиск и фильтры =====
    h('div', { style:{margin:'1.5rem 0 1rem',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'} },
      h('div', { className:'admin-search', style:{flex:1,minWidth:200} },
        h(Icon.search),
        h('input', {
          placeholder: 'Поиск по урокам...',
          value: search,
          onChange: e => { setSearch(e.target.value); if (e.target.value) setActiveModule('all'); }
        })
      ),
      !showingAll && h('select', {
        value: sortOrder,
        onChange: e => setSortOrder(e.target.value),
        style: { background:'var(--bg2)', color:'var(--text1)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 10px', fontSize:13, cursor:'pointer' }
      },
        h('option', { value: 'newest' }, 'Сначала новые'),
        h('option', { value: 'oldest' }, 'Сначала старые')
      ),
      !showingAll && h('div', { style:{fontSize:13,color:'var(--text-dim)',whiteSpace:'nowrap'} },
        filteredLessons.length + ' уроков'
      ),
      (activeModule !== 'all' || search) && h('button', {
        className: 'section-link',
        onClick: () => { setActiveModule('all'); setSearch(''); }
      }, 'Сбросить')
    ),

    // ===== Заголовок раздела =====
    !showingAll && !isMiniKurs && h('div', { className: 'section-head', style: { marginTop: '0.5rem' } },
      h('div', { className: 'section-title' },
        search ? 'Результаты поиска' : mainModules.find(m => m.id === activeModule)?.title
      )
    ),

    // ===== Список уроков — обычный раздел =====
    !showingAll && !isMiniKurs && (
      filteredLessons.length === 0
        ? h('div', { style:{textAlign:'center',padding:'40px',color:'var(--text-dim)'} }, 'Ничего не найдено')
        : h('div', { className: 'lessons-list' },
            ...filteredLessons.map(lesson => h(LessonCard, { key: lesson.id, lesson }))
          )
    ),

    // ===== Мини-курсы — сгруппированные подразделы =====
    isMiniKurs && (
      search
        ? (filteredLessons.length === 0
            ? h('div', { style:{textAlign:'center',padding:'40px',color:'var(--text-dim)'} }, 'Ничего не найдено')
            : h('div', { className: 'lessons-list' },
                ...filteredLessons.map(lesson => h(LessonCard, { key: lesson.id, lesson }))
              )
          )
        : h('div', null,
            ...subModules.map(sub => {
              const subLessons = LESSONS.filter(l => l.moduleId === sub.id)
                .sort((a, b) => sortOrder === 'newest' ? parseDate(b.date) - parseDate(a.date) : parseDate(a.date) - parseDate(b.date));
              if (subLessons.length === 0) return null;
              return h('div', { key: sub.id, style:{marginBottom:'2rem'} },
                h('div', { className: 'section-head', style:{marginTop:'0.5rem'} },
                  h('div', { style:{display:'flex',alignItems:'center',gap:10} },
                    h('div', { style:{
                      width:32, height:32, borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center',
                      background: moduleIconStyle(sub.id).background, color: moduleIconStyle(sub.id).color, flexShrink:0
                    }}, h(Icon[sub.icon] || Icon.book)),
                    h('div', { className: 'section-title', style:{margin:0} }, sub.title),
                    h('div', { style:{fontSize:13,color:'var(--text-dim)',marginLeft:4} }, subLessons.length + ' уроков')
                  )
                ),
                h('div', { className: 'lessons-list' },
                  ...subLessons.map(lesson => h(LessonCard, { key: lesson.id, lesson }))
                )
              );
            })
          )
    )
  );
}

// ===== LESSON PLAYER =====

  const mod = MODULES.find(m => m.id === lesson.moduleId);
  const currentIdx = LESSONS.findIndex(l => l.id === lesson.id);
  const prevLesson = LESSONS[currentIdx - 1];
  const nextLesson = LESSONS[currentIdx + 1];

  return h('div', { className: 'player-wrap' },
    h('button', { className: 'back-btn', onClick: onBack },
      h(Icon.chevronLeft),
      'Назад к урокам'

    h('div', { className: 'video-container' },
      lesson.kinescopeId

            allow: 'autoplay; fullscreen; picture-in-picture; encrypted-media; gyroscope; accelerometer; clipboard-write; screen-wake-lock;',

            allowFullScreen: true,
            style: { width: '100%', height: '100%', border: 'none', display: 'block' }

        h('div', { className: 'player-module-tag' }, mod?.title),
        h('div', { className: 'player-title' }, lesson.title),
        h('div', { className: 'player-meta-row' },
          h('div', { className: 'player-meta-item' }, h(Icon.clock), lesson.duration)
        )
      ),
      h('div', { className: 'player-actions' },
        h('button', { className: 'btn-primary ' + (lesson.done ? 'done' : ''), onClick: onComplete },

          h('a', {
            key: i,
            href: f.url,
            target: '_blank',
            rel: 'noopener',
            style:{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 14px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:10,color:'var(--accent)',fontSize:14,fontWeight:600,textDecoration:'none',transition:'all 0.15s'}
          },
            h('svg', { width:16, height:16, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2 },
              h('path', { d:'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4' }),
              h('polyline', { points:'7 10 12 15 17 10' }),
              h('line', { x1:12, y1:15, x2:12, y2:3 })

          )
        )

    h('div', { className: 'lesson-nav' },
      prevLesson && h('button', { className: 'lesson-nav-btn', onClick: () => onPrev(prevLesson) },
        h(Icon.chevronLeft),

          h('div', { className: 'lesson-nav-label' }, 'Предыдущий'),
          h('div', { className: 'lesson-nav-title' }, prevLesson.title)
        )

      nextLesson && h('button', { className: 'lesson-nav-btn next', onClick: () => onNext(nextLesson) },

        h('div', { className: 'lesson-nav-info' },
          h('div', { className: 'lesson-nav-label' }, 'Следующий'),
          h('div', { className: 'lesson-nav-title' }, nextLesson.title)
        )
      )
    )
  );
}

function StudentsBase() {
  const [search,        setSearch]        = useState('');
  const [cityFilter,    setCityFilter]    = useState('all');
  const [revenueFilter, setRevenueFilter] = useState('all');
  const [nishaFilter,   setNishaFilter]   = useState('all');
  const [page,          setPage]          = useState(1);
  const [activeStudent, setActiveStudent] = useState(null);
  const [students,      setStudents]      = useState([]);
  const [total,         setTotal]         = useState(0);
  const [totalPages,    setTotalPages]    = useState(1);
  const [loading,       setLoading]       = useState(true);
  const [filters,       setFilters]       = useState({ cities: [], niches: [] });
  const PER_PAGE = 24;

  // Загружаем фильтры один раз
  useEffect(() => {
    api.get('/api/students/filters')
      .then(f => setFilters(f))
      .catch(() => {});
  }, []);

  // Загружаем учеников при изменении фильтров/страницы
  useEffect(() => {
    setLoading(true);
    const params = new URLSearchParams({ page, limit: PER_PAGE });
    if (search)                    params.set('search',  search);
    if (cityFilter    !== 'all')   params.set('city',    cityFilter);
    if (revenueFilter !== 'all')   params.set('revenue', revenueFilter);
    if (nishaFilter   !== 'all')   params.set('niche',   nishaFilter);

    api.get('/api/students?' + params.toString())
      .then(res => {
        // Нормализуем поля: API отдаёт full_name/niche/telegram_user, компонент ждёт name/nisha/handle
        // can_share=0 → контакты скрыты (handle=null, phone/email=null)
        const normalized = res.students.map(s => ({
          ...s,
          name:      s.full_name || s.first_name || 'Участник',
          initials:  ((s.full_name || s.first_name || 'U').split(' ').map(w => w[0]).join('').slice(0,2)).toUpperCase(),
          handle:    s.can_share ? (s.telegram_user ? '@' + s.telegram_user : null) : null,
          phone:     s.can_share ? (s.phone || null) : null,
          email:     s.can_share ? (s.email || null) : null,
          nisha:     s.niche || '—',
          city:      s.city  || '—',
          revenue:   s.revenue || '—',
          goal:      s.goal  || '',
          strengths: s.strengths || '',
        }));
        setStudents(normalized);
        setTotal(res.total);
        setTotalPages(res.pages || 1);
      })
      .catch(() => setStudents([]))
      .finally(() => setLoading(false));
  }, [search, cityFilter, revenueFilter, nishaFilter, page]);

  // При смене фильтров — на первую страницу
  useEffect(() => { setPage(1); }, [search, cityFilter, revenueFilter, nishaFilter]);

  function resetFilters() {
    setSearch(''); setCityFilter('all'); setRevenueFilter('all'); setNishaFilter('all');
  }
  const hasFilters = search || cityFilter !== 'all' || revenueFilter !== 'all' || nishaFilter !== 'all';

  const revenueOrder = ['Новичок', 'до 10 млн', '10-50 млн', '50-200 млн', '200+ млн'];

  return h('div', { className: 'content-wide' },
    h('div', { className: 'admin-toolbar' },
      h('div', { className: 'admin-search' },
        h(Icon.search),
        h('input', {
          placeholder: 'Поиск по имени, нику, нише или цели...',
          value: search,
          onChange: e => setSearch(e.target.value)
        })
      ),
      h('select', { className: 'admin-filter-select', value: cityFilter, onChange: e => setCityFilter(e.target.value) },
        h('option', { value: 'all' }, 'Все города (' + total + ')'),
        ...filters.cities.map(({ city, cnt }) => h('option', { key: city, value: city }, city + ' (' + cnt + ')'))
      ),
      h('select', { className: 'admin-filter-select', value: revenueFilter, onChange: e => setRevenueFilter(e.target.value) },
        h('option', { value: 'all' }, 'Любая выручка'),
        ...revenueOrder.map(r => h('option', { key: r, value: r }, r))
      ),
      h('select', { className: 'admin-filter-select', value: nishaFilter, onChange: e => setNishaFilter(e.target.value) },
        h('option', { value: 'all' }, 'Все ниши'),
        ...filters.niches.map(({ niche, cnt }) => h('option', { key: niche, value: niche }, niche + ' (' + cnt + ')'))
      ),
      hasFilters && h('button', { className: 'btn-secondary', onClick: resetFilters }, 'Сбросить')
    ),

    h('div', { className: 'results-bar' },
      loading
        ? h('span', null, '⏳ Загрузка...')
        : h('span', null, 'Найдено участников: ', h('strong', null, total),
            totalPages > 1 && h('span', null, ' • Страница ' + page + ' из ' + totalPages))
    ),

    loading
      ? h('div', { style:{textAlign:'center',padding:'60px',color:'var(--text-dim)'} }, '⏳ Загружаем участников...')
      : students.length === 0
        ? h('div', { className: 'admin-empty', style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:14} },
            'По вашим фильтрам никого не нашлось.', h('br'), h('br'),
            h('button', { className: 'btn-secondary', onClick: resetFilters, style:{margin:'0 auto'} }, 'Сбросить фильтры')
          )
        : h('div', { className: 'students-grid' },
            ...students.map(student =>
              h('div', { key: student.id, className: 'student-card' },
                // Роль-бейджи
                h('div', { className: 'student-role-badges' },
                  student.nisha !== '—' && h('span', { className: 'student-role-tag seller' }, student.nisha)
                ),
                // Аватар
                student.photo_url
                  ? h('img', { src: student.photo_url, className: 'student-avatar', onError: e => { e.target.style.display='none'; } })
                  : h('div', { className: 'student-avatar', style: avatarStyle(student.id) }, student.initials),
                // Имя
                h('div', { className: 'student-name' }, student.name),
                // Выручка
                student.revenue !== '—' && h('div', { className: 'student-revenue' }, student.revenue + '/мес'),
                // Город
                student.city !== '—' && h('div', { className: 'student-city' }, h(Icon.mapPin), student.city),
                // Кнопки
                h('div', { className: 'student-btns' },
                  h('button', {
                    className: 'student-btn-profile',
                    onClick: () => setActiveStudent(student)
                  }, 'Открыть профиль'),
                  student.handle
                    ? h('a', {
                        className: 'student-tg-btn',
                        href: 'https://t.me/' + student.handle.replace('@',''),
                        target: '_blank', rel: 'noopener',
                        onClick: e => e.stopPropagation()
                      }, h(Icon.telegram), 'Написать в ТГ')
                    : h('button', { className:'student-tg-btn', disabled:true }, h(Icon.telegram), 'Контакт скрыт')
                )
              )
            )
          ),

    totalPages > 1 && h('div', { className: 'pagination' },
      h('button', { className:'page-btn', disabled: page === 1,          onClick: () => setPage(p => Math.max(1, p - 1)) },          h(Icon.chevronLeft), 'Назад'),
      h('div',    { className:'page-info' }, 'Страница ', h('strong', null, page), ' из ', totalPages),
      h('button', { className:'page-btn', disabled: page === totalPages, onClick: () => setPage(p => Math.min(totalPages, p + 1)) }, 'Вперёд', h(Icon.chevronRight))
    ),

    activeStudent && h(StudentModal, { student: activeStudent, onClose: () => setActiveStudent(null) })
  );
}

// ===== CONTRACTORS =====
function ContractorModal({ c, onClose, onRate }) {
  const [hovered,    setHovered]    = useState(0);
  const [myRating,   setMyRating]   = useState(c.my_rating || 0);
  const [avgRating,  setAvgRating]  = useState(c.avg_rating || 0);
  const [ratingCount,setRatingCount]= useState(c.rating_count || 0);
  const [copied,     setCopied]     = useState(false);
  const [rateSaved,  setRateSaved]  = useState(false);
  const [rateErr,    setRateErr]    = useState('');

  function copyPromo(code) {
    navigator.clipboard?.writeText(code);
    setCopied(true); setTimeout(() => setCopied(false), 1500);
  }

  async function handleRate(stars) {
    setMyRating(stars);
    setRateSaved(false);
    setRateErr('');
    try {

function ContractorsBase() {
  const [activeCat,    setActiveCat]    = useState('Все');
  const [contractors,  setContractors]  = useState([]);
  const [categories,   setCategories]   = useState([]);
  const [loading,      setLoading]      = useState(true);
  const [selected,     setSelected]     = useState(null);

  useEffect(() => {
    api.get('/api/contractors')
      .then(res => {
        setContractors(res.contractors.map(c => ({ ...c, desc: c.description, promo: c.promo_code })));
        setCategories(['Все', ...res.categories.map(c => c.category)]);
      })
      .catch(() => {
        setContractors(CONTRACTORS);
        setCategories(['Все', ...new Set(CONTRACTORS.map(c => c.category))]);
      })
      .finally(() => setLoading(false));
  }, []);

  const filtered = activeCat === 'Все' ? contractors : contractors.filter(c => c.category === activeCat);

  function handleRate(id, avg, cnt, mine) {
    setContractors(cs => cs.map(c => c.id === id ? { ...c, avg_rating: avg, rating_count: cnt, my_rating: mine } : c));
    if (selected?.id === id) setSelected(s => ({ ...s, avg_rating: avg, rating_count: cnt, my_rating: mine }));
  }

  if (loading) return h('div', { style:{textAlign:'center',padding:'60px',color:'var(--text-dim)'} }, '⏳ Загружаем подрядчиков...');

  return h('div', { className: 'content-wide' },
    selected && h(ContractorModal, { c: selected, onClose: () => setSelected(null), onRate: handleRate }),

    h('div', { className: 'contractors-categories' },
      ...categories.map(cat =>
        h('button', { key: cat, className: 'cat-chip ' + (activeCat === cat ? 'active' : ''), onClick: () => setActiveCat(cat) }, cat)
      )
    ),

    h('div', { className: 'contractors-grid' },
      ...filtered.map(c => {
        const avg = c.avg_rating || 0;
        const displayAvg = avg > 0 ? Math.round(avg * 10) / 10 : 0;
        const desc = c.description || c.desc || '';
        return h('div', { key: c.id, className: 'contractor-card', onClick: () => setSelected(c) },
          h('div', { className: 'contractor-head' },
            h('div', { className: 'contractor-name-block' },
              h('div', { className: 'contractor-name' }, c.name),
              h('div', { className: 'contractor-category', style:{marginTop:4} }, c.category)
            ),
            displayAvg > 0 && h('div', { className: 'contractor-rating' },
              h(Icon.star),
              displayAvg,
              c.rating_count > 0 && h('span', { style:{fontSize:11,color:'var(--text-dim)',fontWeight:400} }, ' (' + c.rating_count + ')')
            )
          ),
          desc && h('div', { className: 'contractor-desc' }, desc),
          h('div', { style:{marginTop:'auto',paddingTop:10,fontSize:13,color:'var(--text-dim)'} },
            (c.promo_code || c.promo) && h('span', { style:{color:'var(--accent)',fontWeight:700} }, 'Есть промокод · '),
            'Нажмите для подробностей'
          )
        );
      })
    )
  );
}

function Profile({ user }) {
  const [sub,            setSub]            = useState(null);
  const [employees,      setEmployees]      = useState([]);
  const [empSlots,       setEmpSlots]       = useState(0);
  const [empOrders,      setEmpOrders]      = useState([]);
  const [profileData,    setProfileData]    = useState(null);
  const [editing,        setEditing]        = useState(false);
  const [editData,       setEditData]       = useState({});
  const [saving,         setSaving]         = useState(false);
  const [showAddEmpModal, setShowAddEmpModal] = useState(false);

  const name     = user ? ((user.first_name||'') + ' ' + (user.last_name||'')).trim() || 'Участник' : 'Участник';
  const handle   = user?.username ? '@' + user.username : '';
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || 'УЧ';

  useEffect(() => {
    api.get('/api/me/subscription').then(s => setSub(s)).catch(() => setSub({ active: true, message: 'Dev режим' }));
    api.get('/api/me/employees').then(r => { setEmployees(r.employees); setEmpSlots(r.paid_slots||0); setEmpOrders(r.orders||[]); }).catch(()=>{});
    // Загружаем данные из базы учеников по telegram_id
    api.get('/api/me/profile-data').then(r => setProfileData(r.data)).catch(()=>{});
  }, []);

  async function saveProfile() {
    setSaving(true);
    try {
      await api.patch('/api/me/profile-data', editData);
      setProfileData(d => ({...d, ...editData}));
      setEditing(false);
    } catch(e) { alert('Ошибка сохранения'); }
    finally { setSaving(false); }
  }

    if (!confirm('Удалить сотрудника?')) return;
    api.delete('/api/me/employees/' + id).then(() => setEmployees(e => e.filter(emp => emp.id !== id))).catch(() => alert('Ошибка'));

      user,
      onClose: () => setShowAddEmpModal(false),

// ===== ADMIN: CONTRACTORS =====
function AdminContractors({ onDataChange }) {
  const [contractors, setContractors] = useState([]);
  const [editing, setEditing] = useState(null); // null | 'new' | {id,...}
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    api.get('/api/contractors').then(r => setContractors(r.contractors)).catch(() => {});
  }, []);

  function startNew() { setForm({name:'',category:'',description:'',contact:'',website:'',promo_code:''}); setEditing('new'); }
  function startEdit(c) { setForm({...c, website: c.website || ''}); setEditing(c); }

  async function save() {
    setSaving(true);
    try {
      if (editing === 'new') {
        await api.post('/api/admin/contractors', form);
      } else {
        await api.patch('/api/admin/contractors/' + editing.id, form);
      }
      const r = await api.get('/api/contractors');
      setContractors(r.contractors);
      setEditing(null);
      onDataChange && onDataChange();
    } catch(e) { alert('Ошибка: ' + e.message); }
    setSaving(false);
  }

  async function remove(id) {
    if (!confirm('Удалить подрядчика?')) return;
    await api.delete('/api/admin/contractors/' + id);
    setContractors(c => c.filter(x => x.id !== id));
    onDataChange && onDataChange();
  }

  const inputStyle = {width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box',fontFamily:'inherit'};

  if (editing) return h('div', null,
    h('div', { style:{display:'flex',justifyContent:'space-between',marginBottom:16} },
      h('div', { style:{fontSize:15,fontWeight:700} }, editing==='new' ? 'Новый подрядчик' : 'Редактировать'),
      h('button', { onClick:()=>setEditing(null), style:{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:13} }, '← Назад')
    ),
    h('div', { style:{display:'flex',flexDirection:'column',gap:10} },
      ...[ ['Название', 'name'], ['Категория', 'category'], ['Описание', 'description'], ['Контакт (TG/телефон)', 'contact'], ['Сайт / Telegram ссылка', 'website'], ['Промокод', 'promo_code'] ].map(([label, key]) =>
        h('div', { key },
          h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:4} }, label),
          key === 'description'
            ? h('textarea', { style:{...inputStyle,resize:'vertical',minHeight:60}, value:form[key]||'', onChange:e=>setForm(f=>({...f,[key]:e.target.value})) })
            : h('input', { style:inputStyle, value:form[key]||'', onChange:e=>setForm(f=>({...f,[key]:e.target.value})) })
        )
      ),
      h('button', { onClick:save, disabled:saving, style:{padding:'10px',borderRadius:8,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:14,fontWeight:600} },
        saving ? 'Сохранение...' : 'Сохранить'
      )
    )
  );

  return h('div', null,
    h('div', { style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16} },
      h('div', { style:{fontSize:14,color:'var(--text-dim)'} }, contractors.length + ' подрядчиков'),
      h('button', { onClick:startNew, style:{padding:'8px 16px',borderRadius:8,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:13,fontWeight:600} }, '+ Добавить')
    ),
    h('div', { className:'admin-table' },
      h('table', { style:{width:'100%',borderCollapse:'collapse'} },
        h('thead', null,
          h('tr', null,
            ...['Название','Категория','Контакт','Промокод',''].map(col =>
              h('th', { key:col, style:{textAlign:'left',padding:'8px 12px',fontSize:12,color:'var(--text-dim)',borderBottom:'1px solid var(--border)',fontWeight:600} }, col)
            )
          )
        ),
        h('tbody', null,
          ...contractors.map(c =>
            h('tr', { key:c.id, style:{borderBottom:'1px solid var(--border)'} },
              h('td', { style:{padding:'10px 12px',fontSize:13,fontWeight:600} }, c.name),
              h('td', { style:{padding:'10px 12px',fontSize:12,color:'var(--text-dim)'} }, c.category),
              h('td', { style:{padding:'10px 12px',fontSize:12} }, c.contact),
              h('td', { style:{padding:'10px 12px',fontSize:12,color:'var(--accent)',fontWeight:700} }, c.promo_code),
              h('td', { style:{padding:'10px 12px',display:'flex',gap:8} },
                h('button', { onClick:()=>startEdit(c), style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',color:'var(--text)'} }, 'Ред.'),
                h('button', { onClick:()=>remove(c.id), style:{background:'rgba(255,91,91,0.1)',border:'1px solid rgba(255,91,91,0.3)',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',color:'#FF5B5B'} }, 'Удал.')
              )
            )
          )
        )
      )
    )
  );
}

// ===== ADMIN: STUDENTS =====
function AdminStudents() {
  const [students,   setStudents]   = useState([]);
  const [admins,     setAdmins]     = useState([]);
  const [search,     setSearch]     = useState('');
  const [page,       setPage]       = useState(1);
  const [total,      setTotal]      = useState(0);
  const [pages,      setPages]      = useState(1);
  const [loading,    setLoading]    = useState(true);
  const [adminInput, setAdminInput] = useState('');
  const [adminMsg,   setAdminMsg]   = useState('');
  const [activeTab,  setActiveTab]  = useState('students'); // 'students' | 'admins' | 'devices'
  const [devSearch,  setDevSearch]  = useState('');
  const [devInfo,    setDevInfo]    = useState(null);
  const [devLoading, setDevLoading] = useState(false);
  const [devMsg,     setDevMsg]     = useState('');

  function loadStudents() {
    setLoading(true);
    const params = new URLSearchParams({ page, limit: 20 });
    if (search) params.set('search', search);
    api.get('/api/students?' + params).then(r => {
      setStudents(r.students.map(s => ({...s, name: s.full_name||s.first_name||'—', handle: s.telegram_user ? '@'+s.telegram_user : '—' })));
      setTotal(r.total); setPages(r.pages||1);
    }).catch(()=>{}).finally(()=>setLoading(false));
  }

  function loadAdmins() {
    api.get('/api/admin/list-admins').then(r => setAdmins(r.admins)).catch(()=>{});
  }

  useEffect(() => { loadStudents(); }, [search, page]);
  useEffect(() => { setPage(1); }, [search]);
  useEffect(() => { if (activeTab === 'admins') loadAdmins(); }, [activeTab]);

  async function lookupDevices() {
    if (!devSearch.trim()) return;
    setDevLoading(true); setDevInfo(null); setDevMsg('');
    try {
      const clean = devSearch.trim().replace('@', '');
      const info = await api.get('/api/admin/devices/' + clean);
      setDevInfo({ ...info, identifier: devSearch.trim() });
    } catch(e) {
      setDevMsg('❌ Пользователь не найден. Убедитесь что он хотя бы раз входил на сайт.');
    } finally { setDevLoading(false); }
  }

  async function resetDevices(telegramId, name) {
    if (!confirm('Сбросить ВСЕ входы для ' + name + '?\nПользователь выйдет со всех устройств и сможет войти заново.')) return;
    try {
      await api.post('/api/admin/reset-devices', { telegram_id: telegramId });
      setDevMsg('✅ Входы сброшены. Пользователь может войти заново.');
      setDevInfo(null); setDevSearch('');
    } catch(e) { setDevMsg('❌ Ошибка: ' + e.message); }
    setTimeout(() => setDevMsg(''), 4000);
  }

  async function grantAdmin() {
    if (!adminInput.trim()) return;
    try {
      const res = await api.post('/api/admin/grant-admin', { identifier: adminInput.trim() });
      setAdminMsg('✅ Права выданы: ' + (res.username ? '@'+res.username : res.telegram_id));
      setAdminInput('');
      loadAdmins();
    } catch(e) {
      const isNotFound = e.message === 'user_not_found';
      setAdminMsg(isNotFound
        ? '❌ Пользователь не найден. Он должен сначала войти на сайт через Telegram.'
        : '❌ Ошибка: ' + e.message);
    }
    setTimeout(() => setAdminMsg(''), 5000);
  }

  async function revokeAdmin(telegramId, name) {
    if (!confirm('Убрать права администратора у ' + name + '?')) return;
    try {
      await api.post('/api/admin/revoke-admin', { telegram_id: telegramId });
      loadAdmins();
    } catch(e) { alert('Ошибка: ' + e.message); }
  }

  const tabStyle = (t) => ({
    padding:'8px 16px', borderRadius:8, border:'none', cursor:'pointer', fontSize:13, fontWeight:600,
    background: activeTab===t ? 'var(--accent)' : 'var(--bg3)',
    color: activeTab===t ? 'white' : 'var(--text-dim)'
  });

  return h('div', null,
    // Переключатель вкладок
    h('div', { style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'} },
      h('button', { style:tabStyle('students'), onClick:()=>setActiveTab('students') }, '👥 Участники (' + total + ')'),
      h('button', { style:tabStyle('admins'),   onClick:()=>setActiveTab('admins') }, '🛡 Администраторы'),
      h('button', { style:tabStyle('devices'),  onClick:()=>setActiveTab('devices') }, '📱 Устройства')
    ),

    // ── Вкладка управления устройствами ──
    activeTab === 'devices' && h('div', null,
      h('div', { style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:'16px 18px',marginBottom:16} },
        h('div', { style:{fontSize:14,fontWeight:800,marginBottom:4} }, '📱 Управление устройствами'),
        h('div', { style:{fontSize:12,color:'var(--text2)',marginBottom:14,lineHeight:1.6} },
          'Каждый пользователь может войти максимум с ',
          h('strong', { style:{color:'var(--accent)'} }, '2 устройств'),
          '. При попытке войти с 3-го — система заблокирует вход. Чтобы дать пользователю возможность войти с нового устройства, сбросьте все его входы ниже.'
        ),
        h('div', { style:{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'} },
          h('input', {
            style:{flex:1,minWidth:200,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'9px 13px',color:'var(--text)',fontSize:13,outline:'none'},
            placeholder:'Telegram ID или @username',
            value: devSearch,
            onChange: e => setDevSearch(e.target.value),
            onKeyDown: e => e.key === 'Enter' && lookupDevices()
          }),
          h('button', {
            onClick: lookupDevices,
            disabled: devLoading,
            style:{padding:'9px 18px',borderRadius:8,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:13,fontWeight:700,whiteSpace:'nowrap'}
          }, devLoading ? '...' : 'Проверить')
        ),
        devMsg && h('div', { style:{marginTop:10,fontSize:13,fontWeight:700,color: devMsg.startsWith('✅') ? 'var(--green)' : 'var(--red)'} }, devMsg),

        devInfo && h('div', { style:{marginTop:14,background:'var(--bg3)',borderRadius:10,padding:'14px 16px',border:'1px solid var(--border)'} },
          h('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'} },
            h('div', null,
              h('div', { style:{fontSize:13,fontWeight:800,marginBottom:6} }, 'Идентификатор: ', h('span', { style:{color:'var(--accent)'} }, devInfo.identifier)),
              h('div', { style:{display:'flex',gap:16,flexWrap:'wrap'} },
                h('div', null,
                  h('span', { style:{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.5px',fontWeight:800} }, 'Устройств'),
                  h('div', { style:{
                    fontSize:28,fontWeight:900,letterSpacing:'-1px',
                    color: devInfo.devices_count >= devInfo.max_devices ? 'var(--red)' : 'var(--green)'
                  } }, devInfo.devices_count + ' / ' + devInfo.max_devices)
                ),
                devInfo.sessions.map((s, i) =>
                  h('div', { key:i, style:{background:'var(--bg4)',borderRadius:8,padding:'8px 12px',minWidth:130} },
                    h('div', { style:{fontSize:10,fontWeight:800,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:4} }, 'Устройство ' + s.slot),
                    h('div', { style:{fontSize:11,color:'var(--text2)'} }, '📅 ' + s.added),
                    s.refreshed && h('div', { style:{fontSize:10,color:'var(--text3)',marginTop:2} }, '🔄 ' + s.refreshed)
                  )
                )
              )
            ),
            devInfo.devices_count > 0 && h('button', {
              onClick: () => resetDevices(devInfo.identifier.replace('@',''), devInfo.identifier),
              style:{background:'rgba(255,91,91,0.12)',border:'1px solid rgba(255,91,91,0.35)',color:'#FF5B5B',borderRadius:9,padding:'10px 16px',fontSize:13,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}
            }, '🗑 Сбросить все входы')
          )
        )
      ),

      // Быстрый сброс прямо из таблицы участников (заблокированные)
      h('div', { style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 16px'} },
        h('div', { style:{fontSize:12,color:'var(--text3)',fontWeight:700,marginBottom:8,textTransform:'uppercase',letterSpacing:'0.6px'} }, 'Быстрый сброс из списка'),
        loading
          ? h('div', { style:{color:'var(--text3)',fontSize:13,padding:'8px 0'} }, 'Загрузка...')
          : h('div', { style:{display:'flex',flexDirection:'column',gap:6} },
              students.slice(0,10).map(s =>
                h('div', { key:s.id, style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,padding:'6px 0',borderBottom:'1px solid var(--border)'} },
                  h('div', null,
                    h('span', { style:{fontSize:13,fontWeight:700} }, s.name),
                    h('span', { style:{fontSize:11,color:'var(--text3)',marginLeft:8} }, s.handle)
                  ),
                  h('button', {
                    onClick: async () => {
                      if (!s.telegram_id) return;
                      if (!confirm('Сбросить устройства для ' + s.name + '?')) return;
                      try {
                        await api.post('/api/admin/reset-devices', { telegram_id: s.telegram_id });

                        setTimeout(() => setDevMsg(''), 3000);
                      } catch(e) { alert('Ошибка: ' + e.message); }
                    },
                    style:{background:'rgba(255,184,46,0.1)',border:'1px solid rgba(255,184,46,0.3)',color:'var(--yellow)',borderRadius:7,padding:'4px 12px',fontSize:11,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}

              h('div', { style:{fontSize:11,color:'var(--text3)',marginTop:6} }, 'Показано первые 10. Для поиска конкретного — используйте форму выше.')
            )

    ),

    // Блок управления админами
    h('div', { style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 16px',marginBottom:16} },
      h('div', { style:{fontSize:13,fontWeight:700,marginBottom:10,color:'var(--text)'} }, '🛡 Назначить администратора'),
      h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:10,lineHeight:1.5} },
        '⚠️ Пользователь должен сначала войти на сайт через Telegram — только тогда он появится в системе.'
      ),
      h('div', { style:{display:'flex',gap:8,alignItems:'center'} },
        h('input', {
          style:{flex:1,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13},
          placeholder:'@username или Telegram ID',
          value: adminInput,
          onChange: e => setAdminInput(e.target.value),
          onKeyDown: e => e.key === 'Enter' && grantAdmin()

        h('button', { onClick:grantAdmin, style:{padding:'8px 16px',borderRadius:8,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:13,fontWeight:600,whiteSpace:'nowrap'} }, 'Выдать права')
      ),
      adminMsg && h('div', { style:{marginTop:8,fontSize:13,color: adminMsg.startsWith('✅') ? 'var(--green)' : '#FF5B5B',lineHeight:1.5} }, adminMsg)
    ),

    // Список администраторов
    activeTab === 'admins' && h('div', { className:'admin-table' },
      admins.length === 0
        ? h('div', { style:{textAlign:'center',padding:30,color:'var(--text-dim)'} }, 'Нет данных')
        : h('table', { style:{width:'100%',borderCollapse:'collapse'} },
