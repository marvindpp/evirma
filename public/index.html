<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Evirma Club</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0B;
    --bg2: #131316;
    --bg3: #1C1C21;
    --bg4: #26262D;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #F5F5F7;
    --text2: #8A8A95;
    --text3: #55555F;
    --accent: #FF6B2C;
    --accent-hover: #FF854D;
    --accent-dim: rgba(255,107,44,0.12);
    --accent-border: rgba(255,107,44,0.3);
    --green: #3DD68C;
    --green-dim: rgba(61,214,140,0.12);
    --red: #FF5B5B;
    --yellow: #F5B82E;
    --yellow-dim: rgba(245,184,46,0.12);
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #root { min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* ===== AUTH ===== */
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 800px 600px at 50% 0%, rgba(255,107,44,0.08), transparent 70%),
      radial-gradient(ellipse 600px 400px at 20% 100%, rgba(255,107,44,0.04), transparent 70%),
      var(--bg);
  }
  .auth-wrap::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
  }
  .auth-card {
    background: rgba(19,19,22,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 2.5rem 2.25rem;
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .auth-logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 2rem;
  }
  .logo-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 26px; height: 26px; }
  .logo-text-wrap { display: flex; flex-direction: column; line-height: 1; }
  .logo-text-sm { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 2px; margin-bottom: 4px; }
  .logo-text-lg { font-size: 18px; font-weight: 900; letter-spacing: 0.5px; }
  .logo-text-lg span { color: var(--accent); }

  .auth-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.6px;
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }
  .auth-sub {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 2rem;
    line-height: 1.55;
  }
  .tg-button {
    width: 100%;
    background: var(--accent);
    color: white;
    border-radius: 14px;
    padding: 1rem 1.25rem;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    box-shadow: 0 8px 24px rgba(255,107,44,0.25);
  }
  .tg-button:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 12px 32px rgba(255,107,44,0.35); }
  .tg-button:active { transform: translateY(0); }
  .tg-button svg { width: 20px; height: 20px; fill: white; }

  .auth-note {
    margin-top: 1.5rem;
    padding: 1rem;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .auth-note-icon {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    color: var(--accent);
    margin-top: 1px;
  }
  .auth-note-text { font-size: 12px; color: var(--text2); line-height: 1.5; }

  .auth-features {
    display: flex;
    justify-content: space-between;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .auth-feat { text-align: center; flex: 1; }
  .auth-feat-num { font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -0.3px; }
  .auth-feat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-top: 2px; }

  /* ===== APP LAYOUT ===== */
  .app {
    display: flex;
    min-height: 100vh;
    background: var(--bg);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .sidebar-head {
    padding: 1.5rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-logo .logo-icon { width: 38px; height: 38px; border-radius: 10px; }
  .sidebar-logo .logo-icon svg { width: 22px; height: 22px; }
  .sidebar-logo-name {
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.3px;
    line-height: 1.1;
  }
  .sidebar-logo-name span { color: var(--accent); }
  .sidebar-logo-sub { font-size: 9px; color: var(--text3); letter-spacing: 1.5px; font-weight: 700; }

  .sidebar-nav { flex: 1; padding: 1rem 0.75rem; overflow-y: auto; }
  .sidebar-section-title {
    font-size: 10px;
    font-weight: 800;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 0.75rem 0.75rem 0.5rem;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.7rem 0.85rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 2px;
    width: 100%;
    text-align: left;
    position: relative;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: -12px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-item .nav-badge {
    margin-left: auto;
    background: var(--bg4);
    color: var(--text2);
    font-size: 10px;
    font-weight: 800;
    border-radius: 6px;
    padding: 2px 7px;
  }
  .nav-item.active .nav-badge { background: var(--accent); color: white; }

  .sidebar-user {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #FF9960);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
    overflow: hidden;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); font-weight: 600; }
  .logout-btn {
    color: var(--text3);
    padding: 6px;
    border-radius: 8px;
    transition: all 0.15s;
  }
  .logout-btn:hover { color: var(--red); background: rgba(255,91,91,0.1); }
  .logout-btn svg { width: 16px; height: 16px; display: block; }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .topbar {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    flex-shrink: 0;
    background: rgba(10,10,11,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-left { min-width: 0; }
  .topbar-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .topbar-sub { font-size: 12px; color: var(--text2); margin-top: 2px; font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.55rem 0.9rem;
    width: 280px;
    transition: border-color 0.15s;
  }
  .search-box:focus-within { border-color: var(--border2); }
  .search-box svg { width: 15px; height: 15px; color: var(--text3); flex-shrink: 0; }
  .search-box input {
    flex: 1;
    min-width: 0;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
  }
  .search-box input::placeholder { color: var(--text3); }

  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    position: relative;
  }
  .icon-btn:hover { background: var(--bg4); border-color: var(--border2); }
  .icon-btn svg { width: 16px; height: 16px; color: var(--text); }
  .icon-btn-dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid var(--bg3);
  }

  .content {
    flex: 1;
    padding: 2rem;
    overflow-y: auto;
    max-width: 100%;
  }
  .content-wide { max-width: 1400px; margin: 0 auto; }

  /* ===== DASHBOARD ===== */
  .hero-card {
    background:
      radial-gradient(ellipse 600px 300px at 100% 0%, rgba(255,107,44,0.18), transparent 60%),
      linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2rem 2.25rem;
    position: relative;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .hero-greeting { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
  .hero-title { font-size: 28px; font-weight: 900; letter-spacing: -0.7px; margin-bottom: 0.75rem; line-height: 1.15; }
  .hero-title span { color: var(--accent); }
  .hero-desc { font-size: 14px; color: var(--text2); max-width: 520px; margin-bottom: 1.5rem; line-height: 1.6; }
  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    transition: all 0.15s;
  }
  .hero-cta:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .hero-cta svg { width: 14px; height: 14px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem 1.4rem;
    transition: all 0.15s;
  }
  .stat-card:hover { border-color: var(--border2); }
  .stat-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .stat-label { font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
  .stat-icon-box { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .stat-icon-box svg { width: 16px; height: 16px; }
  .stat-icon-orange { background: var(--accent-dim); color: var(--accent); }
  .stat-icon-green { background: var(--green-dim); color: var(--green); }
  .stat-icon-blue { background: rgba(91,140,255,0.12); color: #5B8CFF; }
  .stat-icon-yellow { background: var(--yellow-dim); color: var(--yellow); }
  .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
  .stat-trend { font-size: 11px; color: var(--green); font-weight: 700; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .stat-trend svg { width: 11px; height: 11px; }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-title {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .section-link {
    font-size: 12px;
    color: var(--text2);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
  }
  .section-link:hover { color: var(--accent); }
  .section-link svg { width: 13px; height: 13px; }

  /* ===== MODULE CARDS ===== */
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .module-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .module-card:hover {
    border-color: var(--accent-border);
    background: var(--bg3);
    transform: translateY(-2px);
  }
  .module-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 100% 0%, rgba(255,107,44,0.08), transparent 50%);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .module-card:hover::before { opacity: 1; }
  .module-icon {
    width: 42px;
    height: 42px;
    border-radius: 11px;
    background: var(--accent-dim);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
    position: relative;
    z-index: 1;
  }
  .module-icon svg { width: 20px; height: 20px; }
  .module-name { font-size: 14px; font-weight: 800; margin-bottom: 4px; position: relative; z-index: 1; letter-spacing: -0.2px; }
  .module-count { font-size: 12px; color: var(--text2); font-weight: 600; position: relative; z-index: 1; }
  .module-progress-bar {
    margin-top: 0.85rem;
    height: 3px;
    background: var(--bg4);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .module-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* ===== LESSON LIST ===== */
  .lessons-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .lesson-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .lesson-card:hover {
    border-color: var(--border2);
    background: var(--bg3);
    transform: translateX(4px);
  }
  .lesson-thumb {
    width: 80px;
    height: 52px;
    border-radius: 9px;
    background: linear-gradient(135deg, #2a1a10, #1a0f05);
    border: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .lesson-thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 9px;
  }
  .lesson-thumb::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 40%, rgba(255,107,44,0.2), transparent 60%);
    z-index: 1;
  }
  .lesson-thumb svg {
    width: 18px;
    height: 18px;
    color: rgba(255,255,255,0.85);
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .lesson-thumb-duration {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: rgba(0,0,0,0.75);
    color: white;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 4px;
    z-index: 1;
  }
  .lesson-info { flex: 1; min-width: 0; }
  .lesson-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.2px;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lesson-meta {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lesson-meta-dot { color: var(--text3); }
  .lesson-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 7px;
    flex-shrink: 0;
  }
  .lesson-status svg { width: 11px; height: 11px; }
  .lesson-status.done { background: var(--green-dim); color: var(--green); }
  .lesson-status.new { background: var(--accent-dim); color: var(--accent); }

  /* ===== LESSON PLAYER PAGE ===== */
  .player-wrap { max-width: 980px; margin: 0 auto; }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 1.5rem;
    transition: color 0.15s;
    padding: 0.4rem 0;
  }
  .back-btn:hover { color: var(--text); }
  .back-btn svg { width: 15px; height: 15px; }

  .video-container {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    aspect-ratio: 16/9;
    position: relative;
    margin-bottom: 1.5rem;
  }
  .video-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background:
      radial-gradient(ellipse at center, rgba(255,107,44,0.15), transparent 60%),
      linear-gradient(135deg, #1a0f08, #0a0605);
  }
  .video-play-btn {
    width: 76px;
    height: 76px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 12px 40px rgba(255,107,44,0.4);
  }
  .video-play-btn:hover { transform: scale(1.08); }
  .video-play-btn svg { width: 28px; height: 28px; fill: white; margin-left: 4px; }
  .video-placeholder-label {
    font-size: 13px;
    color: var(--text2);
    font-weight: 600;
    padding: 6px 14px;
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    border: 1px solid var(--border2);
  }

  .player-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .player-title-block { flex: 1; min-width: 0; }
  .player-module-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }
  .player-title { font-size: 26px; font-weight: 900; letter-spacing: -0.6px; line-height: 1.2; margin-bottom: 10px; }
  .player-meta-row { display: flex; gap: 16px; font-size: 13px; color: var(--text2); font-weight: 500; }
  .player-meta-item { display: flex; align-items: center; gap: 6px; }
  .player-meta-item svg { width: 14px; height: 14px; }

  .player-actions { display: flex; gap: 10px; flex-shrink: 0; }
  .btn-primary {
    background: var(--accent);
    color: white;
    border-radius: 11px;
    padding: 0.75rem 1.25rem;
    font-size: 13px;
    font-weight: 700;

  .btn-primary:hover { background: var(--accent-hover); }

  .btn-primary svg { width: 14px; height: 14px; }
  .btn-secondary {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 11px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: var(--bg4); }
  .btn-secondary svg { width: 14px; height: 14px; }

  .player-section {
    background: var(--bg2);
    border: 1px solid var(--border);

    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .player-section-title {
    font-size: 13px;

    letter-spacing: 0.8px;
    margin-bottom: 1rem;

  .player-desc { font-size: 14px; color: var(--text); line-height: 1.7; }
  .player-desc p { margin-bottom: 0.75rem; }
  .player-desc p:last-child { margin-bottom: 0; }

  .timecodes-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .timecode-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0.6rem 0.85rem;
    background: var(--bg3);
    border-radius: 9px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .timecode-item:hover { background: var(--bg4); }
  .timecode-time {
    font-size: 12px;
    font-weight: 800;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 8px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .timecode-text { color: var(--text); font-weight: 500; }

  .materials-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .material-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.85rem 1rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 11px;
    transition: all 0.15s;
    cursor: pointer;
  }
  .material-item:hover { background: var(--bg4); border-color: var(--border2); }
  .material-icon {
    width: 36px;
    height: 36px;
    border-radius: 9px;
    background: var(--accent-dim);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .material-icon svg { width: 16px; height: 16px; }
  .material-info { flex: 1; min-width: 0; }
  .material-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .material-size { font-size: 11px; color: var(--text3); font-weight: 600; }
  .material-download {
    color: var(--text2);
    padding: 6px;
    border-radius: 7px;
    transition: all 0.15s;
  }
  .material-download:hover { color: var(--accent); background: var(--accent-dim); }
  .material-download svg { width: 16px; height: 16px; }

  .lesson-nav {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .lesson-nav-btn {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .lesson-nav-btn:hover { border-color: var(--border2); background: var(--bg3); }
  .lesson-nav-btn svg { width: 18px; height: 18px; color: var(--text2); flex-shrink: 0; }
  .lesson-nav-info { min-width: 0; flex: 1; }
  .lesson-nav-label { font-size: 10px; color: var(--text3); font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
  .lesson-nav-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lesson-nav-btn.next { flex-direction: row-reverse; text-align: right; }

  /* ===== FILTERS ===== */
  .filters-bar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.55rem 0.9rem;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--border2); }
  .filter-chip.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
  .filter-chip svg { width: 13px; height: 13px; }
  .filter-chip-label { color: var(--text3); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ===== STUDENTS GRID ===== */
  .students-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .student-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .student-card:hover {
    border-color: var(--accent-border);
    transform: translateY(-2px);
    background: var(--bg3);
  }
  .student-head { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .student-avatar {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, #2a1a10, var(--bg4));
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 800;
    color: var(--accent);
    flex-shrink: 0;
  }
  .student-head-info { flex: 1; min-width: 0; }
  .student-name { font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
  .student-role-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 800;
    color: var(--text2);
    background: var(--bg4);
    padding: 2px 7px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 3px;
  }
  .student-role-tag.seller { color: var(--accent); background: var(--accent-dim); }
  .student-details { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
  .student-detail-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }
  .student-detail-row svg { width: 13px; height: 13px; color: var(--text3); flex-shrink: 0; }
  .student-detail-row strong { color: var(--text); font-weight: 700; }
  .student-tg-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 0.6rem;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    transition: all 0.15s;
  }
  .student-tg-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .student-tg-btn svg { width: 13px; height: 13px; }

  /* ===== CONTRACTORS ===== */
  .contractors-categories {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .cat-chip {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.55rem 0.95rem;
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-chip:hover { border-color: var(--border2); color: var(--text); }
  .cat-chip.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

  .contractors-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }
  .contractor-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    transition: all 0.15s;
  }
  .contractor-card:hover { border-color: var(--border2); }
  .contractor-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.85rem;
    gap: 10px;
  }
  .contractor-name-block { flex: 1; min-width: 0; }
  .contractor-name { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 4px; }
  .contractor-category {
    display: inline-block;
    font-size: 10px;
    font-weight: 800;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 8px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .contractor-rating {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 800;
    color: var(--yellow);
    flex-shrink: 0;
  }
  .contractor-rating svg { width: 13px; height: 13px; fill: var(--yellow); }
  .contractor-desc { font-size: 12px; color: var(--text2); line-height: 1.55; margin-bottom: 1rem; }
  .contractor-contact {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text);
    background: var(--bg3);
    padding: 0.55rem 0.85rem;
    border-radius: 9px;
    margin-bottom: 0.85rem;
    font-weight: 600;
  }
  .contractor-contact svg { width: 13px; height: 13px; color: var(--text3); flex-shrink: 0; }
  .contractor-promo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, var(--accent-dim), rgba(255,107,44,0.04));
    border: 1px dashed var(--accent-border);
    border-radius: 10px;
    padding: 0.7rem 1rem;
  }
  .contractor-promo-left { display: flex; flex-direction: column; gap: 2px; }
  .contractor-promo-label { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; }
  .contractor-promo-code { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: 0.3px; font-family: 'JetBrains Mono', monospace; }
  .contractor-promo-btn {
    background: var(--accent);
    color: white;
    padding: 6px 12px;
    border-radius: 7px;
    font-size: 11px;
    font-weight: 800;
    transition: all 0.15s;
  }
  .contractor-promo-btn:hover { background: var(--accent-hover); }

  /* ===== PROFILE PAGE ===== */
  .profile-wrap { max-width: 980px; margin: 0 auto; }
  .profile-header {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .profile-header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(255,107,44,0.1), transparent 70%);
    pointer-events: none;
  }
  .profile-avatar-lg {
    width: 96px;
    height: 96px;
    border-radius: 24px;
    background: linear-gradient(135deg, var(--accent), #FF9960);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .profile-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
  .profile-name { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
  .profile-handle { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 10px; }
  .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .profile-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 800;
    padding: 4px 9px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .profile-badge.primary { background: var(--accent-dim); color: var(--accent); }
  .profile-badge.green { background: var(--green-dim); color: var(--green); }
  .profile-badge svg { width: 11px; height: 11px; }

  .profile-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .profile-input:focus { outline: none; border-color: var(--accent); }
  .profile-input option { background: var(--bg2); }

  .profile-edit-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 0.7rem 1.1rem;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    position: relative;
    z-index: 1;
  }
  .profile-edit-btn:hover { background: var(--bg4); border-color: var(--accent-border); }
  .profile-edit-btn svg { width: 13px; height: 13px; }

  .profile-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1.25rem;
  }
  .profile-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }
  .profile-card-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 1.25rem;
  }
  .profile-fields { display: flex; flex-direction: column; gap: 1rem; }
  .profile-field { display: flex; justify-content: space-between; gap: 1rem; align-items: flex-start; }
  .profile-field-label { font-size: 12px; color: var(--text2); font-weight: 600; flex-shrink: 0; }
  .profile-field-value { font-size: 13px; color: var(--text); font-weight: 700; text-align: right; }

  .subscription-card {
    background: linear-gradient(135deg, var(--accent-dim), rgba(255,107,44,0.04));
    border: 1px solid var(--accent-border);
    border-radius: 16px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .sub-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 800;
    color: var(--green);
    background: var(--green-dim);
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 1rem;
  }
  .sub-status::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }
  .sub-tariff { font-size: 20px; font-weight: 900; letter-spacing: -0.4px; margin-bottom: 4px; }
  .sub-price { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 1.25rem; }
  .sub-days { font-size: 32px; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: 4px; letter-spacing: -1px; }
  .sub-days-label { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 1.25rem; }
  .sub-dates { display: flex; justify-content: space-between; padding-top: 1rem; border-top: 1px solid var(--accent-border); margin-bottom: 1.25rem; font-size: 11px; }
  .sub-date { display: flex; flex-direction: column; gap: 2px; }
  .sub-date-label { color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; font-size: 9px; }
  .sub-date-value { color: var(--text); font-weight: 800; font-size: 13px; }
  .sub-extend-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border-radius: 11px;
    padding: 0.8rem;
    font-size: 13px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
  }
  .sub-extend-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .sub-extend-btn svg { width: 14px; height: 14px; }

  /* ===== EMPLOYEES ===== */
  .employees-section { margin-top: 1.25rem; }
  .employees-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .employees-stats { display: flex; gap: 1.5rem; font-size: 12px; color: var(--text2); font-weight: 600; }
  .employees-stats strong { color: var(--text); font-size: 16px; font-weight: 800; }
  .employees-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.75rem;
  }
  .employee-slot {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 8px;
  }
  .employee-slot.filled {
    background: var(--bg2);
    border-color: var(--border2);
  }
  .employee-slot.empty {
    border-style: dashed;
    cursor: pointer;
    transition: all 0.15s;
  }
  .employee-slot.empty:hover {
    border-color: var(--accent-border);
    background: var(--accent-dim);
  }
  .employee-slot .user-avatar {
    width: 48px;
    height: 48px;
    font-size: 16px;
  }
  .employee-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .employee-role { font-size: 10px; color: var(--text3); font-weight: 600; }
  .employee-remove {
    color: var(--text3);
    font-size: 10px;
    font-weight: 600;
    margin-top: 2px;
    padding: 2px 6px;
    border-radius: 5px;
    transition: color 0.15s;
  }
  .employee-remove:hover { color: var(--red); }
  .add-employee-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .add-employee-icon svg { width: 18px; height: 18px; color: var(--text2); }
  .add-employee-text { font-size: 11px; color: var(--text2); font-weight: 700; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1100px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .profile-grid { grid-template-columns: 1fr; }
    .employees-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .mobile-menu-btn { display: none; }
  .sidebar-backdrop { display: none; }

  @media (max-width: 960px) {
    .search-box { width: 200px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .profile-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 280px;
      transform: translateX(-100%);
      z-index: 100;
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 20px 0 60px rgba(0,0,0,0.5);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }
    .mobile-menu-btn { display: flex !important; }
    .search-box { display: none; }

    .topbar {
      padding: 0.9rem 1rem;
      gap: 0.75rem;
    }
    .topbar-title { font-size: 17px; letter-spacing: -0.3px; }
    .topbar-sub { font-size: 11px; }
    .topbar-right { gap: 0.5rem; }

    .content { padding: 1rem; }

    .hero-card { padding: 1.5rem 1.25rem; border-radius: 16px; }
    .hero-title { font-size: 22px; letter-spacing: -0.5px; }
    .hero-desc { font-size: 13px; }
    .hero-greeting { font-size: 12px; }

    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .stat-card { padding: 1rem; border-radius: 14px; }

  /* ===== MODAL ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;

    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);

    padding: 2rem 1rem;
    animation: fadeIn 0.2s ease;

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    position: absolute;

    height: 36px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);

    .modal { max-height: 92vh; border-radius: 20px 20px 0 0; }
    .modal-hero { padding: 2rem 1.5rem 1.25rem; }
    .modal-body { padding: 1.25rem 1.5rem; }
    .modal-footer { padding: 1rem 1.5rem 1.5rem; }
    .modal-name { font-size: 20px; }
    .modal-info-grid { grid-template-columns: 1fr; gap: 0.5rem; }
    .modal-avatar { width: 72px; height: 72px; font-size: 26px; }
  }

  .student-card { cursor: pointer; }

  /* ===== POLISH: smoother card interactions ===== */
  .student-card {
    transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.18s, background 0.18s, box-shadow 0.18s;
  }
  .student-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25), 0 0 0 1px var(--accent-border);
  }
  .student-card:active { transform: translateY(-1px); }

  .module-card {
    transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.18s, background 0.18s, box-shadow 0.18s;
  }
  .module-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }

  .lesson-card {
    transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.18s, background 0.18s;
  }

  .contractor-card {
    transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.18s, box-shadow 0.18s;
  }
  .contractor-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }

  /* Subtle pulse on accent badges */
  .sub-status::before {
    animation: pulseGreen 2s ease-in-out infinite;
  }
  @keyframes pulseGreen {
    0%, 100% { box-shadow: 0 0 8px var(--green); }
    50% { box-shadow: 0 0 14px var(--green), 0 0 0 4px rgba(61,214,140,0.15); }
  }

  /* Smoother filter chip transitions */
  .filter-chip, .cat-chip {
    transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .filter-chip:active, .cat-chip:active { transform: scale(0.96); }

  /* Avatar inner glow on hover */
  .student-avatar {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
  }
  .student-card:hover .student-avatar {
    transform: scale(1.06);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  /* Module icon: subtle scale on card hover */
  .module-icon {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .module-card:hover .module-icon {
    transform: scale(1.08) rotate(-3deg);
  }

  /* Stat card subtle glow */
  .stat-card {
    transition: border-color 0.18s, background 0.18s;
  }
  .stat-card:hover {
    border-color: var(--border2);
    background: var(--bg3);
  }

  /* Cleaner focus outlines for inputs */
  input:focus, select:focus, textarea:focus { outline: none; }

  /* Lesson thumbnail hover */
  .lesson-thumb {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .lesson-card:hover .lesson-thumb { transform: scale(1.05); }
</style>

// ===== API LAYER =====
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3000'
  : '';  // на VPS API и фронт на одном домене

const SESSION_KEY = 'evirma_session_v1';

function getToken() {
  try { return localStorage.getItem(SESSION_KEY); } catch { return null; }
}
function setToken(t) {
  try { localStorage.setItem(SESSION_KEY, t); } catch {}
}
function clearToken() {
  try { localStorage.removeItem(SESSION_KEY); } catch {}
}

async function apiCall(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  const token = getToken();
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body)  opts.body = JSON.stringify(body);
  const r = await fetch(API_BASE + path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    if (r.status === 401) {
      // Сессия аннулирована — вышли с другого устройства
      clearToken();
      window.__sessionKicked = true;
      window.location.reload();
    }
    throw Object.assign(new Error(err.error || r.statusText), { status: r.status });
  }
  return r.json();
}
const api = {
  get:    (p)    => apiCall('GET',    p),
  post:   (p, b) => apiCall('POST',   p, b),
  patch:  (p, b) => apiCall('PATCH',  p, b),
  delete: (p)    => apiCall('DELETE', p),
};

}
function saveStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
}

// Mutable runtime data — initializes from defaults, gets overlaid with admin edits from localStorage
let MODULES = DEFAULT_MODULES.map(m => ({ ...m }));
let LESSONS = DEFAULT_LESSONS.map(l => {
  const override = _stored.lessons?.[l.id];
  return override ? { ...l, ...override } : { ...l };
});
// Recompute module counts after overrides applied
function recomputeModuleCounts() {
  MODULES = MODULES.map(m => {
    const items = LESSONS.filter(l => l.moduleId === m.id);
    return { ...m, total: items.length, done: items.filter(l => l.done).length };
  });
}
recomputeModuleCounts();

function persistAdminChanges() {
  const lessonOverrides = {};
  LESSONS.forEach((l, i) => {
    const def = DEFAULT_LESSONS[i];
    if (!def) return;
    const diff = {};
    if (l.moduleId !== def.moduleId) diff.moduleId = l.moduleId;
    if (l.title !== def.title) diff.title = l.title;
    if (Object.keys(diff).length) lessonOverrides[l.id] = diff;
  });
  saveStorage({ lessons: lessonOverrides });
}

// ===== AUTH PAGE =====
function AuthPage({ onLogin }) {
  const [error, setError] = useState(
    window.__sessionKicked ? '⚠️ Вы вошли с другого устройства. Войдите снова.' : null
  );
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    // Настоящий Telegram Login Widget
    window.onTelegramAuth = async function(tgUser) {
      setLoading(true); setError(null);
      try {
        const res = await api.post('/api/auth/telegram', tgUser);
        if (res.ok) { setToken(res.session); onLogin(res.user); }
      } catch(e) {
        if (e.status === 403) setError('Нет активной подписки. Продли в боте @evirmaclub_bot');
        else setError('Ошибка входа: ' + e.message);
        setLoading(false);
      }
    };
    const script = document.createElement('script');
    script.src = 'https://telegram.org/js/telegram-widget.js?22';
    script.setAttribute('data-telegram-login', 'evirmaclub_bot');
    script.setAttribute('data-size', 'large');
    script.setAttribute('data-onauth', 'onTelegramAuth(user)');
    script.setAttribute('data-request-access', 'write');
    script.async = true;
    const wrap = document.getElementById('tg-widget-wrap');
    if (wrap && !wrap.hasChildNodes()) wrap.appendChild(script);
    return () => { delete window.onTelegramAuth; };
  }, []);

  // Dev-режим fallback если виджет не загрузился
  async function handleDevLogin() {
    setLoading(true); setError(null);
    try {
      const devId = prompt('Dev-режим: введи Telegram ID', '313596616');
      if (!devId) { setLoading(false); return; }
      try {
        const res = await api.post('/api/auth/telegram', { id: devId, first_name: 'User', auth_date: Math.floor(Date.now()/1000) });
        if (res.ok) { setToken(res.session); onLogin(res.user); }
      } catch(apiErr) {
        if (!apiErr.status) { onLogin({ telegram_id: devId, first_name: 'Demo', role: 'student' }); return; }
        if (apiErr.status === 403) setError('Нет активной подписки');
        else setError('Ошибка: ' + apiErr.message);
      }
    } finally { setLoading(false); }
  }

  return h('div', { className: 'auth-wrap' },
    h('div', { className: 'auth-card' },
      h('div', { className: 'auth-logo-row' },
        h(Logo, { size: 48 }),
        h('div', { className: 'logo-text-wrap' },
          h('div', { className: 'logo-text-sm' }, 'CLOSED CLUB'),
          h('div', { className: 'logo-text-lg' }, 'MAX ', h('span', null, 'EVIRMA'))
        )
      ),
      h('h1', { className: 'auth-title' }, 'Добро пожаловать в клуб'),
      h('p', { className: 'auth-sub' }, 'Войдите через Telegram для доступа к эфирам, разборам и базе подрядчиков'),
      error && h('div', { style:{color:'#FF5B5B',background:'rgba(255,91,91,0.1)',padding:'10px 14px',borderRadius:'10px',marginBottom:'12px',fontSize:'14px'} }, error),
      loading && h('div', { style:{textAlign:'center',padding:'12px',color:'var(--text-dim)'} }, '⏳ Входим...'),
      h('div', { id: 'tg-widget-wrap', style:{display:'flex',justifyContent:'center',margin:'16px 0',minHeight:48} }),
      h('div', { className: 'auth-note' },
        h('div', { className: 'auth-note-icon' }, h(Icon.shield)),
        h('div', { className: 'auth-note-text' }, 'Авторизация через ваш Telegram-аккаунт. Доступ получают только участники с активной подпиской.')
      ),
      h('div', { className: 'auth-features' },
        h('div', { className: 'auth-feat' }, h('div', { className: 'auth-feat-num' }, '600+'), h('div', { className: 'auth-feat-label' }, 'Участников')),
        h('div', { className: 'auth-feat' }, h('div', { className: 'auth-feat-num' }, '120+'), h('div', { className: 'auth-feat-label' }, 'Видеоуроков')),
        h('div', { className: 'auth-feat' }, h('div', { className: 'auth-feat-num' }, '40+'), h('div', { className: 'auth-feat-label' }, 'Подрядчиков'))
      )
    )
  );
}

function StudentsBase() {
  const [search,        setSearch]        = useState('');
  const [cityFilter,    setCityFilter]    = useState('all');
  const [revenueFilter, setRevenueFilter] = useState('all');
  const [nishaFilter,   setNishaFilter]   = useState('all');
  const [page,          setPage]          = useState(1);
  const [activeStudent, setActiveStudent] = useState(null);
  const [students,      setStudents]      = useState([]);
  const [total,         setTotal]         = useState(0);
  const [totalPages,    setTotalPages]    = useState(1);
  const [loading,       setLoading]       = useState(true);
  const [filters,       setFilters]       = useState({ cities: [], niches: [] });
  const PER_PAGE = 24;

  // Загружаем фильтры один раз
  useEffect(() => {
    api.get('/api/students/filters')
      .then(f => setFilters(f))
      .catch(() => {});
  }, []);

  // Загружаем учеников при изменении фильтров/страницы
  useEffect(() => {
    setLoading(true);
    const params = new URLSearchParams({ page, limit: PER_PAGE });
    if (search)                    params.set('search',  search);
    if (cityFilter    !== 'all')   params.set('city',    cityFilter);
    if (revenueFilter !== 'all')   params.set('revenue', revenueFilter);
    if (nishaFilter   !== 'all')   params.set('niche',   nishaFilter);

    api.get('/api/students?' + params.toString())
      .then(res => {
        // Нормализуем поля: API отдаёт full_name/niche/telegram_user, компонент ждёт name/nisha/handle
        const normalized = res.students.map(s => ({
          ...s,
          name:    s.full_name || s.first_name || 'Участник',
          initials: ((s.full_name || s.first_name || 'U').split(' ').map(w => w[0]).join('').slice(0,2)).toUpperCase(),
          handle:  s.telegram_user ? '@' + s.telegram_user : null,
          nisha:   s.niche || '—',
          city:    s.city  || '—',
          revenue: s.revenue || '—',
          goal:    s.goal  || '',
          strengths: s.strengths || '',
        }));
        setStudents(normalized);
        setTotal(res.total);
        setTotalPages(res.pages || 1);
      })
      .catch(() => setStudents([]))
      .finally(() => setLoading(false));
  }, [search, cityFilter, revenueFilter, nishaFilter, page]);

  // При смене фильтров — на первую страницу
  useEffect(() => { setPage(1); }, [search, cityFilter, revenueFilter, nishaFilter]);

  function resetFilters() {
    setSearch(''); setCityFilter('all'); setRevenueFilter('all'); setNishaFilter('all');
  }
  const hasFilters = search || cityFilter !== 'all' || revenueFilter !== 'all' || nishaFilter !== 'all';

  const revenueOrder = ['Новичок', 'до 10 млн', '10-50 млн', '50-200 млн', '200+ млн'];

  return h('div', { className: 'content-wide' },
    h('div', { className: 'admin-toolbar' },
      h('div', { className: 'admin-search' },
        h(Icon.search),
        h('input', {
          placeholder: 'Поиск по имени, нику, нише или цели...',
          value: search,
          onChange: e => setSearch(e.target.value)
        })
      ),
      h('select', { className: 'admin-filter-select', value: cityFilter, onChange: e => setCityFilter(e.target.value) },
        h('option', { value: 'all' }, 'Все города (' + total + ')'),
        ...filters.cities.map(({ city, cnt }) => h('option', { key: city, value: city }, city + ' (' + cnt + ')'))
      ),
      h('select', { className: 'admin-filter-select', value: revenueFilter, onChange: e => setRevenueFilter(e.target.value) },
        h('option', { value: 'all' }, 'Любая выручка'),
        ...revenueOrder.map(r => h('option', { key: r, value: r }, r))
      ),
      h('select', { className: 'admin-filter-select', value: nishaFilter, onChange: e => setNishaFilter(e.target.value) },
        h('option', { value: 'all' }, 'Все ниши'),
        ...filters.niches.map(({ niche, cnt }) => h('option', { key: niche, value: niche }, niche + ' (' + cnt + ')'))
      ),
      hasFilters && h('button', { className: 'btn-secondary', onClick: resetFilters }, 'Сбросить')
    ),

    h('div', { className: 'results-bar' },
      loading
        ? h('span', null, '⏳ Загрузка...')
        : h('span', null, 'Найдено участников: ', h('strong', null, total),
            totalPages > 1 && h('span', null, ' • Страница ' + page + ' из ' + totalPages))
    ),

    loading
      ? h('div', { style:{textAlign:'center',padding:'60px',color:'var(--text-dim)'} }, '⏳ Загружаем участников...')
      : students.length === 0
        ? h('div', { className: 'admin-empty', style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:14} },
            'По вашим фильтрам никого не нашлось.', h('br'), h('br'),
            h('button', { className: 'btn-secondary', onClick: resetFilters, style:{margin:'0 auto'} }, 'Сбросить фильтры')
          )
        : h('div', { className: 'students-grid' },
            ...students.map(student =>
              h('div', { key: student.id, className: 'student-card', onClick: () => setActiveStudent(student) },
                h('div', { className: 'student-head' },
                  student.photo_url
                  ? h('img', { src: student.photo_url, className: 'student-avatar', style:{objectFit:'cover'}, onError: e => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; } })
                  : null,
                !student.photo_url && h('div', { className: 'student-avatar', style: avatarStyle(student.id) }, student.initials),
                  h('div', { className: 'student-head-info' },
                    h('div', { className: 'student-name' }, student.name),
                    student.revenue !== '—' && h('div', { className: 'student-role-tag seller' }, student.revenue)
                  )
                ),
                h('div', { className: 'student-details' },
                  h('div', { className: 'student-detail-row' }, h(Icon.mapPin), h('span', null, student.city)),
                  student.nisha !== '—' && h('div', { className: 'student-detail-row' }, h(Icon.briefcase), h('span', null, 'Ниша: ', h('strong', null, student.nisha))),
                  student.goal && h('div', { className: 'student-detail-row student-detail-multiline' }, h(Icon.target), h('span', null, student.goal))
                ),
                student.handle
                  ? h('a', { className:'student-tg-btn', href:'https://t.me/'+student.handle.replace('@',''), target:'_blank', rel:'noopener', onClick: e => e.stopPropagation() }, h(Icon.telegram), 'Написать в Telegram')
                  : h('button', { className:'student-tg-btn', disabled:true, onClick: e => e.stopPropagation() }, h(Icon.telegram), 'Контакт скрыт')
              )
            )
          ),

    totalPages > 1 && h('div', { className: 'pagination' },
      h('button', { className:'page-btn', disabled: page === 1,          onClick: () => setPage(p => Math.max(1, p - 1)) },          h(Icon.chevronLeft), 'Назад'),
      h('div',    { className:'page-info' }, 'Страница ', h('strong', null, page), ' из ', totalPages),
      h('button', { className:'page-btn', disabled: page === totalPages, onClick: () => setPage(p => Math.min(totalPages, p + 1)) }, 'Вперёд', h(Icon.chevronRight))
    ),

    activeStudent && h(StudentModal, { student: activeStudent, onClose: () => setActiveStudent(null) })
  );
}

// ===== CONTRACTORS =====
function ContractorsBase() {
  const [activeCat,    setActiveCat]    = useState('Все');
  const [contractors,  setContractors]  = useState([]);
  const [categories,   setCategories]   = useState([]);
  const [loading,      setLoading]      = useState(true);
  const [copied,       setCopied]       = useState(null);

  useEffect(() => {
    api.get('/api/contractors')
      .then(res => {
        // Нормализуем поля: API отдаёт description/contact/promo_code, компонент ждёт desc/contact/promo
        setContractors(res.contractors.map(c => ({ ...c, desc: c.description, promo: c.promo_code })));
        setCategories(['Все', ...res.categories.map(c => c.category)]);
      })
      .catch(() => {
        // Fallback на хардкод если API недоступен
        setContractors(CONTRACTORS);
        setCategories(['Все', ...new Set(CONTRACTORS.map(c => c.category))]);
      })
      .finally(() => setLoading(false));
  }, []);

  const filtered = activeCat === 'Все' ? contractors : contractors.filter(c => c.category === activeCat);

  function copyPromo(id, code) {
    navigator.clipboard?.writeText(code);
    setCopied(id); setTimeout(() => setCopied(null), 1500);
  }

  if (loading) return h('div', { style:{textAlign:'center',padding:'60px',color:'var(--text-dim)'} }, '⏳ Загружаем подрядчиков...');

  return h('div', { className: 'content-wide' },
    h('div', { className: 'contractors-categories' },
      ...categories.map(cat =>
        h('button', { key: cat, className: 'cat-chip ' + (activeCat === cat ? 'active' : ''), onClick: () => setActiveCat(cat) }, cat)
      )
    ),
    h('div', { className: 'contractors-grid' },
      ...filtered.map(c =>
        h('div', { key: c.id, className: 'contractor-card' },
          h('div', { className: 'contractor-head' },
            h('div', { className: 'contractor-name-block' },
              h('div', { className: 'contractor-name' }, c.name),
              h('div', { className: 'contractor-category' }, c.category)
            ),
            c.rating > 0 && h('div', { className: 'contractor-rating' }, h(Icon.star), c.rating)
          ),
          h('div', { className: 'contractor-desc' }, c.desc || c.description || ''),
          c.contact && h('div', { className: 'contractor-contact' },
            h(Icon.telegram),
            h('span', null, c.contact)
          ),
          c.promo && h('div', { className: 'contractor-promo' },
            h('div', { className: 'contractor-promo-left' },
              h('div', { className: 'contractor-promo-label' }, 'Промокод'),
              h('div', { className: 'contractor-promo-code' }, c.promo)
            ),
            h('button', { className: 'contractor-promo-btn', onClick: () => copyPromo(c.id, c.promo) },
              copied === c.id ? 'СКОПИРОВАНО' : 'КОПИРОВАТЬ'
            )
          )
        )
      )
    )
  );
}

function Profile({ user }) {
  const [sub,         setSub]         = useState(null);
  const [employees,   setEmployees]   = useState([]);
  const [empSlots,    setEmpSlots]    = useState(5);
  const [profileData, setProfileData] = useState(null);
  const [editing,     setEditing]     = useState(false);
  const [editData,    setEditData]    = useState({});
  const [saving,      setSaving]      = useState(false);

  const name     = user ? ((user.first_name||'') + ' ' + (user.last_name||'')).trim() || 'Участник' : 'Участник';
  const handle   = user?.username ? '@' + user.username : '';
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || 'УЧ';

  useEffect(() => {
    api.get('/api/me/subscription').then(s => setSub(s)).catch(() => setSub({ active: true, message: 'Dev режим' }));
    api.get('/api/me/employees').then(r => { setEmployees(r.employees); setEmpSlots(r.slots||5); }).catch(()=>{});
    // Загружаем данные из базы учеников по telegram_id
    api.get('/api/me/profile-data').then(r => setProfileData(r.data)).catch(()=>{});
  }, []);

  async function saveProfile() {
    setSaving(true);
    try {
      await api.patch('/api/me/profile-data', editData);
      setProfileData(d => ({...d, ...editData}));
      setEditing(false);
    } catch(e) { alert('Ошибка сохранения'); }
    finally { setSaving(false); }
  }

  function removeEmployee(id) {
    if (!confirm('Удалить сотрудника?')) return;
    api.delete('/api/me/employees/' + id).then(() => setEmployees(e => e.filter(emp => emp.id !== id))).catch(() => alert('Ошибка'));
  }

  return h('div', { className: 'profile-wrap' },
    h('div', { className: 'profile-header' },
      user?.photo_url

        handle && h('div', { className: 'profile-handle' }, handle),
        h('div', { className: 'profile-badges' },
          h('div', { className: 'profile-badge primary' }, h(Icon.user), 'Участник клуба'),
          sub?.active && h('div', { className: 'profile-badge green' }, h(Icon.checkCircle), 'Активная подписка')
        )
      )
    ),

    h('div', { className: 'profile-grid' },
      h('div', { className: 'profile-card' },
        h('div', { className: 'profile-card-title' }, 'Анкета участника'),
        editing
          ? h('div', null,
              h('div', { style:{display:'flex',flexDirection:'column',gap:14} },

                h('div', { className: 'profile-field', style:{flexDirection:'column',gap:6} },
                  h('div', { className: 'profile-field-label' }, 'Имя и фамилия'),
                  h('input', { className:'profile-input', placeholder:'Иван Иванов', value: editData.full_name||'', onChange: e => setEditData(d=>({...d,full_name:e.target.value})) })
                ),

                h('div', { className: 'profile-field', style:{flexDirection:'column',gap:6} },
                  h('div', { className: 'profile-field-label' }, 'Телефон'),
                  h('input', { className:'profile-input', placeholder:'+7 900 000 00 00', value: editData.phone||'', onChange: e => setEditData(d=>({...d,phone:e.target.value})) })
                ),

                h('div', { className: 'profile-field', style:{flexDirection:'column',gap:6} },

                  h('input', { className:'profile-input', placeholder:'Москва', value: editData.city||'', onChange: e => setEditData(d=>({...d,city:e.target.value})) })
                ),

                ),

                h('div', { className: 'profile-field', style:{flexDirection:'column',gap:6} },

                  h('select', { className:'profile-input', value: editData.revenue||'', onChange: e => setEditData(d=>({...d,revenue:e.target.value})) },
