  const [editing, setEditing] = useState(null); // null | 'new' | {id,...}
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    api.get('/api/contractors').then(r => setContractors(r.contractors)).catch(() => {});
  }, []);

  function startNew() { setForm({name:'',category:'',description:'',contact:'',promo_code:'',rating:5}); setEditing('new'); }
  function startEdit(c) { setForm({...c}); setEditing(c); }

  async function save() {
    setSaving(true);
    try {
      if (editing === 'new') {
        await api.post('/api/admin/contractors', form);
      } else {
        await api.patch('/api/admin/contractors/' + editing.id, form);
      }
      const r = await api.get('/api/contractors');
      setContractors(r.contractors);
      setEditing(null);
      onDataChange && onDataChange();
    } catch(e) { alert('Ошибка: ' + e.message); }
    setSaving(false);
  }

  async function remove(id) {
    if (!confirm('Удалить подрядчика?')) return;
    await api.delete('/api/admin/contractors/' + id);
    setContractors(c => c.filter(x => x.id !== id));
  }

  const inputStyle = {width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box',fontFamily:'inherit'};

  if (editing) return h('div', null,
    h('div', { style:{display:'flex',justifyContent:'space-between',marginBottom:16} },
      h('div', { style:{fontSize:15,fontWeight:700} }, editing==='new' ? 'Новый подрядчик' : 'Редактировать'),
      h('button', { onClick:()=>setEditing(null), style:{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:13} }, '← Назад')
    ),
    h('div', { style:{display:'flex',flexDirection:'column',gap:10} },
      ...[ ['Название', 'name'], ['Категория', 'category'], ['Описание', 'description'], ['Контакт (TG/телефон)', 'contact'], ['Промокод', 'promo_code'] ].map(([label, key]) =>
        h('div', { key },
          h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:4} }, label),
          key === 'description'
            ? h('textarea', { style:{...inputStyle,resize:'vertical',minHeight:60}, value:form[key]||'', onChange:e=>setForm(f=>({...f,[key]:e.target.value})) })
            : h('input', { style:inputStyle, value:form[key]||'', onChange:e=>setForm(f=>({...f,[key]:e.target.value})) })
        )
      ),
      h('div', null,
        h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:4} }, 'Рейтинг (0-5)'),
        h('input', { type:'number', min:0, max:5, step:0.1, style:{...inputStyle,width:100}, value:form.rating||0, onChange:e=>setForm(f=>({...f,rating:parseFloat(e.target.value)})) })
      ),
      h('button', { onClick:save, disabled:saving, style:{padding:'10px',borderRadius:8,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:14,fontWeight:600} },
        saving ? 'Сохранение...' : 'Сохранить'
      )
    )
  );

  return h('div', null,
    h('div', { style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16} },
      h('div', { style:{fontSize:14,color:'var(--text-dim)'} }, contractors.length + ' подрядчиков'),
      h('button', { onClick:startNew, style:{padding:'8px 16px',borderRadius:8,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:13,fontWeight:600} }, '+ Добавить')
    ),
    h('div', { className:'admin-table' },
      h('table', { style:{width:'100%',borderCollapse:'collapse'} },
        h('thead', null,
          h('tr', null,
            ...['Название','Категория','Контакт','Промокод','Рейтинг',''].map(col =>
              h('th', { key:col, style:{textAlign:'left',padding:'8px 12px',fontSize:12,color:'var(--text-dim)',borderBottom:'1px solid var(--border)',fontWeight:600} }, col)
            )
          )
        ),
        h('tbody', null,
          ...contractors.map(c =>
            h('tr', { key:c.id, style:{borderBottom:'1px solid var(--border)'} },
              h('td', { style:{padding:'10px 12px',fontSize:13,fontWeight:600} }, c.name),
              h('td', { style:{padding:'10px 12px',fontSize:12,color:'var(--text-dim)'} }, c.category),
              h('td', { style:{padding:'10px 12px',fontSize:12} }, c.contact),
              h('td', { style:{padding:'10px 12px',fontSize:12,color:'var(--accent)',fontWeight:700} }, c.promo_code),
              h('td', { style:{padding:'10px 12px',fontSize:12} }, '★ ' + c.rating),
              h('td', { style:{padding:'10px 12px',display:'flex',gap:8} },
                h('button', { onClick:()=>startEdit(c), style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',color:'var(--text)'} }, 'Ред.'),
                h('button', { onClick:()=>remove(c.id), style:{background:'rgba(255,91,91,0.1)',border:'1px solid rgba(255,91,91,0.3)',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',color:'#FF5B5B'} }, 'Удал.')
              )
            )
          )
        )
      )
    )
  );
}

// ===== ADMIN: STUDENTS =====
function AdminStudents() {
  const [students,   setStudents]   = useState([]);
  const [admins,     setAdmins]     = useState([]);
  const [search,     setSearch]     = useState('');
  const [page,       setPage]       = useState(1);
  const [total,      setTotal]      = useState(0);
  const [pages,      setPages]      = useState(1);
  const [loading,    setLoading]    = useState(true);
  const [adminInput, setAdminInput] = useState('');
  const [adminMsg,   setAdminMsg]   = useState('');
  const [activeTab,  setActiveTab]  = useState('students'); // 'students' | 'admins'

  function loadStudents() {
    setLoading(true);
    const params = new URLSearchParams({ page, limit: 20 });
    if (search) params.set('search', search);
    api.get('/api/students?' + params).then(r => {
      setStudents(r.students.map(s => ({...s, name: s.full_name||s.first_name||'—', handle: s.telegram_user ? '@'+s.telegram_user : '—' })));
      setTotal(r.total); setPages(r.pages||1);
    }).catch(()=>{}).finally(()=>setLoading(false));
  }

  function loadAdmins() {
    api.get('/api/admin/list-admins').then(r => setAdmins(r.admins)).catch(()=>{});
  }

  useEffect(() => { loadStudents(); }, [search, page]);
  useEffect(() => { setPage(1); }, [search]);
  useEffect(() => { if (activeTab === 'admins') loadAdmins(); }, [activeTab]);

  async function grantAdmin() {
    if (!adminInput.trim()) return;
    try {
      const res = await api.post('/api/admin/grant-admin', { identifier: adminInput.trim() });
      setAdminMsg('✅ Права выданы: ' + (res.username ? '@'+res.username : res.telegram_id));
      setAdminInput('');
      loadAdmins();
    } catch(e) {
      const isNotFound = e.message === 'user_not_found';
      setAdminMsg(isNotFound
        ? '❌ Пользователь не найден. Он должен сначала войти на сайт через Telegram.'
        : '❌ Ошибка: ' + e.message);
    }
    setTimeout(() => setAdminMsg(''), 5000);
  }

  async function revokeAdmin(telegramId, name) {
    if (!confirm('Убрать права администратора у ' + name + '?')) return;
    try {
      await api.post('/api/admin/revoke-admin', { telegram_id: telegramId });
      loadAdmins();
    } catch(e) { alert('Ошибка: ' + e.message); }
  }

  const tabStyle = (t) => ({
    padding:'8px 16px', borderRadius:8, border:'none', cursor:'pointer', fontSize:13, fontWeight:600,
    background: activeTab===t ? 'var(--accent)' : 'var(--bg3)',
    color: activeTab===t ? 'white' : 'var(--text-dim)'
  });

  return h('div', null,
    // Переключатель вкладок
    h('div', { style:{display:'flex',gap:8,marginBottom:16} },
      h('button', { style:tabStyle('students'), onClick:()=>setActiveTab('students') }, '👥 Участники (' + total + ')'),
      h('button', { style:tabStyle('admins'), onClick:()=>setActiveTab('admins') }, '🛡 Администраторы')
    ),

    // Блок управления админами
    h('div', { style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 16px',marginBottom:16} },
      h('div', { style:{fontSize:13,fontWeight:700,marginBottom:10,color:'var(--text)'} }, '🛡 Назначить администратора'),
      h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:10,lineHeight:1.5} },
        '⚠️ Пользователь должен сначала войти на сайт через Telegram — только тогда он появится в системе.'
      ),
      h('div', { style:{display:'flex',gap:8,alignItems:'center'} },
        h('input', {
          style:{flex:1,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13},
          placeholder:'@username или Telegram ID',
          value: adminInput,
          onChange: e => setAdminInput(e.target.value),
          onKeyDown: e => e.key === 'Enter' && grantAdmin()
        }),
        h('button', { onClick:grantAdmin, style:{padding:'8px 16px',borderRadius:8,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:13,fontWeight:600,whiteSpace:'nowrap'} }, 'Выдать права')
      ),
      adminMsg && h('div', { style:{marginTop:8,fontSize:13,color: adminMsg.startsWith('✅') ? 'var(--green)' : '#FF5B5B',lineHeight:1.5} }, adminMsg)
    ),

    // Список администраторов
    activeTab === 'admins' && h('div', { className:'admin-table' },
      admins.length === 0
        ? h('div', { style:{textAlign:'center',padding:30,color:'var(--text-dim)'} }, 'Нет данных')
        : h('table', { style:{width:'100%',borderCollapse:'collapse'} },
            h('thead', null,
              h('tr', null,
                ...['Имя','Telegram ID','Username','Добавлен',''].map(col =>
                  h('th', { key:col, style:{textAlign:'left',padding:'8px 12px',fontSize:12,color:'var(--text-dim)',borderBottom:'1px solid var(--border)',fontWeight:600} }, col)
                )
              )
            ),
            h('tbody', null,
              ...admins.map(a =>
                h('tr', { key:a.telegram_id, style:{borderBottom:'1px solid var(--border)'} },
                  h('td', { style:{padding:'10px 12px',fontSize:13,fontWeight:600} }, a.first_name || '—'),
                  h('td', { style:{padding:'10px 12px',fontSize:12,color:'var(--text-dim)'} }, a.telegram_id),
                  h('td', { style:{padding:'10px 12px',fontSize:12,color:'var(--accent)'} }, a.username ? '@'+a.username : '—'),
                  h('td', { style:{padding:'10px 12px',fontSize:12,color:'var(--text-dim)'} }, a.created_at ? new Date(a.created_at).toLocaleDateString('ru-RU') : '—'),
                  h('td', { style:{padding:'10px 12px'} },
                    h('button', {
                      onClick: () => revokeAdmin(a.telegram_id, a.first_name || a.telegram_id),
                      style:{background:'rgba(255,91,91,0.1)',border:'1px solid rgba(255,91,91,0.3)',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',color:'#FF5B5B'}
                    }, 'Убрать права')
                  )
                )
              )
            )
          )
    ),

    // Список учеников
    activeTab === 'students' && h('div', null,
      h('div', { style:{display:'flex',gap:10,marginBottom:16,alignItems:'center'} },
        h('div', { className:'admin-search', style:{flex:1} },
          h(Icon.search),
          h('input', { placeholder:'Поиск по имени, нику...', value:search, onChange:e=>setSearch(e.target.value) })
        ),
        h('div', { style:{fontSize:13,color:'var(--text-dim)',whiteSpace:'nowrap'} }, 'Всего: ' + total)
      ),
      loading
        ? h('div', { style:{textAlign:'center',padding:40,color:'var(--text-dim)'} }, 'Загрузка...')
        : h('div', { className:'admin-table' },
            h('table', { style:{width:'100%',borderCollapse:'collapse'} },
              h('thead', null,
                h('tr', null,
                  ...['Имя','Telegram','Город','Ниша','Выручка','Подписка'].map(col =>
                    h('th', { key:col, style:{textAlign:'left',padding:'8px 12px',fontSize:12,color:'var(--text-dim)',borderBottom:'1px solid var(--border)',fontWeight:600} }, col)
                  )
                )
              ),
              h('tbody', null,
                ...students.map(s =>
                  h('tr', { key:s.id, style:{borderBottom:'1px solid var(--border)'} },
                    h('td', { style:{padding:'8px 12px',fontSize:13,fontWeight:600} }, s.name),
                    h('td', { style:{padding:'8px 12px',fontSize:12,color:'var(--accent)'} }, s.handle),
                    h('td', { style:{padding:'8px 12px',fontSize:12} }, s.city||'—'),
                    h('td', { style:{padding:'8px 12px',fontSize:12} }, s.niche||'—'),
                    h('td', { style:{padding:'8px 12px',fontSize:12} }, s.revenue||'—'),
                    h('td', { style:{padding:'8px 12px'} },
                      h('span', { style:{fontSize:11,padding:'2px 8px',borderRadius:4,background:s.sub_active?'rgba(61,214,140,0.15)':'rgba(255,91,91,0.1)',color:s.sub_active?'var(--green)':'#FF5B5B',fontWeight:600} },
                        s.sub_active ? 'Активна' : 'Нет'
                      )
                    )
                  )
                )
              )
            ),
            pages > 1 && h('div', { className:'pagination', style:{marginTop:16} },
              h('button', { className:'page-btn', disabled:page===1, onClick:()=>setPage(p=>p-1) }, h(Icon.chevronLeft), 'Назад'),
              h('div', { className:'page-info' }, 'Стр. ', h('strong',null,page), ' из ', pages),
              h('button', { className:'page-btn', disabled:page===pages, onClick:()=>setPage(p=>p+1) }, 'Вперёд', h(Icon.chevronRight))
            )
          )
    )
  );
}

// ===== ADMIN: CONTENT MANAGEMENT =====
function AdminContent({ onDataChange }) {
  const [tab, setTab] = useState('lessons');
  const [search, setSearch] = useState('');
  const [moduleFilter, setModuleFilter] = useState('all');
  const [selected, setSelected] = useState(new Set());
  const [bulkTarget, setBulkTarget] = useState('');
  const [savedToast, setSavedToast] = useState(false);
  const [, forceUpdate] = useState(0);

  function showSavedToast() {
    setSavedToast(true);
    setTimeout(() => setSavedToast(false), 1800);
  }

  function commitChange() {
    recomputeModuleCounts();
    persistAdminChanges();
    forceUpdate(n => n + 1);
    onDataChange && onDataChange();
    showSavedToast();
  }

  function changeLessonModule(lessonId, newModuleId) {
    const idx = LESSONS.findIndex(l => l.id === lessonId);
    if (idx === -1) return;
    LESSONS[idx] = { ...LESSONS[idx], moduleId: newModuleId };
    // Синхронизируем с API
    api.patch('/api/admin/lessons/' + lessonId, { module_id: newModuleId }).catch(() => {});
    commitChange();
  }

  function renameLesson(lessonId, newTitle) {
    const idx = LESSONS.findIndex(l => l.id === lessonId);
    if (idx === -1) return;
    LESSONS[idx] = { ...LESSONS[idx], title: newTitle };
    // Синхронизируем с API
    api.patch('/api/admin/lessons/' + lessonId, { title: newTitle }).catch(() => {});
    persistAdminChanges();
    forceUpdate(n => n + 1);
    onDataChange && onDataChange();
  }

  function bulkMove() {
    if (!bulkTarget || selected.size === 0) return;
    const ids = [...selected];
    ids.forEach(id => {
      const idx = LESSONS.findIndex(l => l.id === id);
      if (idx !== -1) LESSONS[idx] = { ...LESSONS[idx], moduleId: bulkTarget };
    });
    // Синхронизируем bulk с API
    api.patch('/api/admin/lessons/bulk-move', { lesson_ids: ids, module_id: bulkTarget }).catch(() => {});
    setSelected(new Set());
    setBulkTarget('');
    commitChange();
  }

  function toggleSelect(id) {
    const next = new Set(selected);
    if (next.has(id)) next.delete(id);
    else next.add(id);
    setSelected(next);
  }

  function toggleSelectAll(visibleIds) {
    const allSelected = visibleIds.every(id => selected.has(id));
    const next = new Set(selected);
    if (allSelected) visibleIds.forEach(id => next.delete(id));
    else visibleIds.forEach(id => next.add(id));
    setSelected(next);
  }

  function resetAll() {
    if (!confirm('Сбросить все ваши изменения и вернуть исходные данные?')) return;
    localStorage.removeItem(STORAGE_KEY);
    LESSONS = DEFAULT_LESSONS.map(l => ({ ...l }));
    recomputeModuleCounts();
    forceUpdate(n => n + 1);
    onDataChange && onDataChange();
    showSavedToast();
  }

  // Filter lessons
  const filteredLessons = LESSONS.filter(l => {
    if (moduleFilter !== 'all' && l.moduleId !== moduleFilter) return false;
    if (search && !l.title.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const visibleIds = filteredLessons.map(l => l.id);
  const allVisibleSelected = visibleIds.length > 0 && visibleIds.every(id => selected.has(id));

  return h('div', { className: 'content-wide' },
    h('div', { className: 'admin-tabs' },
      h('button', { className: 'admin-tab ' + (tab === 'lessons' ? 'active' : ''), onClick: () => setTab('lessons') },
        h(Icon.video), 'Видеоуроки', h('span', { className: 'admin-tab-count' }, LESSONS.length)
      ),
      h('button', { className: 'admin-tab ' + (tab === 'contractors' ? 'active' : ''), onClick: () => setTab('contractors') },
        h(Icon.briefcase), 'Подрядчики', h('span', { className: 'admin-tab-count' }, CONTRACTORS.length)
      ),
      h('button', { className: 'admin-tab ' + (tab === 'students' ? 'active' : ''), onClick: () => setTab('students') },
        h(Icon.users), 'Участники', h('span', { className: 'admin-tab-count' }, '633')
      )
    ),

    tab === 'lessons' && h(React.Fragment, null,
      // Stats
      h('div', { className: 'admin-stats' },
        h('div', { className: 'admin-stat' },
          h('div', { className: 'admin-stat-label' }, 'Всего видео'),
          h('div', { className: 'admin-stat-value' }, LESSONS.length)
        ),
        h('div', { className: 'admin-stat' },
          h('div', { className: 'admin-stat-label' }, 'Разделов'),
          h('div', { className: 'admin-stat-value accent' }, MODULES.length)
        ),
        h('div', { className: 'admin-stat' },
          h('div', { className: 'admin-stat-label' }, 'Изменений'),
          h('div', { className: 'admin-stat-value' }, Object.keys(loadStorage().lessons || {}).length)
        ),
        h('div', { className: 'admin-stat' },
          h('div', { className: 'admin-stat-label' }, 'Найдено'),
          h('div', { className: 'admin-stat-value' }, filteredLessons.length)
        )
      ),

      // Toolbar
      h('div', { className: 'admin-toolbar' },
        h('div', { className: 'admin-search' },
          h(Icon.search),
          h('input', {
            placeholder: 'Поиск по названию урока...',
            value: search,
            onChange: e => setSearch(e.target.value)
          })
        ),
        h('select', {
          className: 'admin-filter-select',
          value: moduleFilter,
          onChange: e => setModuleFilter(e.target.value)
        },
          h('option', { value: 'all' }, 'Все разделы (' + LESSONS.length + ')'),
          ...MODULES.map(m =>
            h('option', { key: m.id, value: m.id }, m.title + ' (' + m.total + ')')
          )
        ),
        h('button', {
          className: 'btn-secondary',
          onClick: resetAll,
          title: 'Сбросить все изменения'
        },
          h(Icon.logout),
          'Сбросить'
        )
      ),

      // Bulk action bar
      selected.size > 0 && h('div', { className: 'admin-bulk-bar' },
        h('div', { className: 'admin-bulk-count' }, 'Выбрано: ' + selected.size),
        h('div', { className: 'admin-bulk-actions' },
          h('select', {
            value: bulkTarget,
            onChange: e => setBulkTarget(e.target.value)
          },
            h('option', { value: '' }, 'Переместить в раздел...'),
            ...MODULES.map(m =>
              h('option', { key: m.id, value: m.id }, m.title)
            )
          ),
          h('button', {
            className: 'btn-primary',
            onClick: bulkMove,
            disabled: !bulkTarget,
            style: !bulkTarget ? { opacity: 0.5, pointerEvents: 'none' } : {}
          },
            h(Icon.check),
            'Применить'
          ),
          h('button', { className: 'admin-bulk-clear', onClick: () => setSelected(new Set()) }, 'Отменить')
        )
      ),

      // Table
      h('div', { className: 'admin-table' },
        h('div', { className: 'admin-table-head' },
          h('div', null,
            h('button', {
              className: 'admin-checkbox ' + (allVisibleSelected ? 'checked' : ''),
              onClick: () => toggleSelectAll(visibleIds)
            }, h(Icon.check))
          ),
          h('div', null, 'Название урока'),
          h('div', null, 'Длит.'),
          h('div', null, 'Дата'),
          h('div', null, 'Раздел')
        ),
        filteredLessons.length === 0
          ? h('div', { className: 'admin-empty' }, 'Ничего не найдено')
          : filteredLessons.map(lesson =>
              h('div', {
                key: lesson.id,
                className: 'admin-row ' + (selected.has(lesson.id) ? 'selected' : '')
              },
                h('button', {
                  className: 'admin-checkbox ' + (selected.has(lesson.id) ? 'checked' : ''),
                  onClick: () => toggleSelect(lesson.id)
                }, h(Icon.check)),
                h('div', { className: 'admin-row-title' },
                  h('input', {
                    className: 'admin-row-title-input',
                    defaultValue: lesson.title,
                    onBlur: e => {
                      if (e.target.value !== lesson.title && e.target.value.trim()) {
                        renameLesson(lesson.id, e.target.value.trim());
                      }
                    },
                    onKeyDown: e => { if (e.key === 'Enter') e.target.blur(); }
                  }),
                  h('input', {
                    style:{fontSize:11,color:'var(--text-dim)',background:'transparent',border:'none',borderBottom:'1px dashed var(--border)',width:'100%',marginTop:3,padding:'2px 0',outline:'none'},
                    placeholder:'Описание урока (опционально)...',
                    defaultValue: lesson.description||'',
                    onBlur: e => {
                      if (e.target.value !== (lesson.description||'')) {
                        lesson.description = e.target.value;
                        api.patch('/api/admin/lessons/' + lesson.id, { description: e.target.value }).catch(()=>{});
                      }
                    }
                  }),
                  h('div', { className: 'admin-row-meta-mobile' },
                    h('span', null, lesson.duration),
                    h('span', null, '•'),
                    h('span', null, lesson.date)
                  )
                ),
                h('div', { className: 'admin-row-duration' }, lesson.duration),
                h('div', { className: 'admin-row-date' }, lesson.date),
                h('select', {
                  className: 'admin-module-select',
                  value: lesson.moduleId,
                  onChange: e => changeLessonModule(lesson.id, e.target.value)
                },
                  ...MODULES.map(m =>
                    h('option', { key: m.id, value: m.id }, m.title)
                  )
                )
              )
            )
      )
    ),

    tab === 'contractors' && h(AdminContractors, { onDataChange }),

    tab === 'students' && h(AdminStudents),

    savedToast && h('div', { className: 'admin-saved-toast' },
      h(Icon.check),
      'Сохранено'
    )
  );
}

// ===== APP =====
// Маппинг названий разделов из API → slug для moduleIconStyle
const MODULE_SLUG_MAP = {
  'Эфиры с Максом':            'efiry-max',
  'Эфиры со спикерами':        'efiry-spikery',
  'Разборы топов':              'razbory-topov',
  'Разборы участников':         'razbory-uch',
  'Разборы рекламных кампаний': 'razbory-rk',
  'Таблицы':                    'tablicy',
  'Мини-курсы':                 'mini-kursy',
};
const MODULE_ICON_MAP = {
  'Эфиры с Максом':            'mic',
  'Эфиры со спикерами':        'users',
  'Разборы топов':              'trending',
  'Разборы участников':         'target',
  'Разборы рекламных кампаний': 'zap',
  'Таблицы':                    'table',
  'Мини-курсы':                 'book',
};

async function loadApiData() {
  const [mods, lsn] = await Promise.all([api.get('/api/modules'), api.get('/api/lessons')]);

  // Полностью заменяем MODULES данными из API
  MODULES.length = 0;
  mods.modules.forEach(m => {
    const slug = MODULE_SLUG_MAP[m.title] || m.slug || m.title;
    MODULES.push({
      id: slug,
      title: m.title,
      icon: MODULE_ICON_MAP[m.title] || 'book',
      total: m.lesson_count,
      done: 0,
    });
  });

  // Полностью заменяем LESSONS данными из API
  LESSONS.length = 0;
  lsn.lessons.forEach(l => {
    const mod = MODULES.find(m => m.title === (mods.modules.find(x => x.id === l.module_id)?.title));
    LESSONS.push({
      id:          l.id,            // Kinescope UUID
      kinescopeId: l.id,            // плеер использует kinescopeId
      moduleId:    mod?.id || '',
      title:       l.title,
      description: l.description || '',
      duration:    l.duration,
      duration_sec: l.duration_sec,
      embed_url:   l.embed_url,
      poster_url:  l.poster_url || '',
      isNew:       false,
      date:        l.created_at ? new Date(l.created_at).toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric'}) : '',
      views:       0,
    });
  });

  recomputeModuleCounts();
}

// ===== ONBOARDING — анкета при первом входе =====
function OnboardingForm({ user, onComplete }) {
  const [form, setForm] = useState({
    city: '', niche: '', revenue: '', goal: '', strengths: '', can_share: true
  });
  const [saving, setSaving] = useState(false);
  const [step, setStep] = useState(1); // 2 шага

  const inp = {
    style:{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px',color:'var(--text)',fontSize:14,boxSizing:'border-box',fontFamily:'inherit'},
  };

  async function submit() {
    setSaving(true);
    try {
      await api.patch('/api/me/profile-data', form);
      onComplete();
    } catch(e) { alert('Ошибка: ' + e.message); }
    setSaving(false);
  }

  return h('div', { style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'24px'} },
    h('div', { style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:20,padding:'32px',maxWidth:480,width:'100%'} },
      h('div', { style:{display:'flex',alignItems:'center',gap:12,marginBottom:8} },
        h(Logo, { size: 36 }),
        h('div', { style:{fontSize:18,fontWeight:700,color:'var(--text)'} }, 'Добро пожаловать!')
      ),
      h('p', { style:{color:'var(--text-dim)',fontSize:14,marginBottom:24,lineHeight:1.6} },
        'Привет, ' + (user?.first_name || 'участник') + '! Заполни анкету — другие участники смогут найти тебя в базе клуба.'
      ),

      h('div', { style:{display:'flex',gap:4,marginBottom:24} },
        [1,2].map(s => h('div', { key:s, style:{flex:1,height:3,borderRadius:4,background: s<=step ? 'var(--accent)' : 'var(--border)'} }))
      ),

      step === 1 && h('div', { style:{display:'flex',flexDirection:'column',gap:14} },
        h('div', null,
          h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:6,fontWeight:600} }, 'Город'),
          h('input', { ...inp, placeholder:'Москва, Санкт-Петербург...', value:form.city, onChange:e=>setForm(f=>({...f,city:e.target.value})) })
        ),
        h('div', null,
          h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:6,fontWeight:600} }, 'Ниша на Wildberries'),
          h('input', { ...inp, placeholder:'Женская одежда, Дом, Детям...', value:form.niche, onChange:e=>setForm(f=>({...f,niche:e.target.value})) })
        ),
        h('div', null,
          h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:6,fontWeight:600} }, 'Годовой оборот'),
          h('select', { ...inp, value:form.revenue, onChange:e=>setForm(f=>({...f,revenue:e.target.value})) },
            h('option', {value:''}, 'Выберите...'),
            ['Новичок','до 10 млн','10-50 млн','50-200 млн','200+ млн'].map(r => h('option',{key:r,value:r},r))
          )
        ),
        h('button', {
          onClick: ()=>setStep(2),
          disabled: !form.city || !form.niche || !form.revenue,
          style:{padding:'12px',borderRadius:10,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:15,fontWeight:700,width:'100%',marginTop:8,opacity:(!form.city||!form.niche||!form.revenue)?0.5:1}
        }, 'Далее →')
      ),

      step === 2 && h('div', { style:{display:'flex',flexDirection:'column',gap:14} },
        h('div', null,
          h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:6,fontWeight:600} }, 'Цель участия в клубе'),
          h('textarea', { ...inp, placeholder:'Хочу получать актуальную информацию о рекламе на WB...', rows:3, style:{...inp.style,resize:'vertical'}, value:form.goal, onChange:e=>setForm(f=>({...f,goal:e.target.value})) })
        ),
        h('div', null,
          h('div', { style:{fontSize:12,color:'var(--text-dim)',marginBottom:6,fontWeight:600} }, 'Ваши сильные стороны'),
          h('textarea', { ...inp, placeholder:'Производство, контакты поставщиков, экспертиза в рекламе...', rows:3, style:{...inp.style,resize:'vertical'}, value:form.strengths, onChange:e=>setForm(f=>({...f,strengths:e.target.value})) })
        ),
        h('div', { style:{display:'flex',alignItems:'flex-start',gap:10,padding:'12px',background:'var(--bg3)',borderRadius:10,border:'1px solid var(--border)'} },
          h('input', { type:'checkbox', id:'ob_share', checked:form.can_share, onChange:e=>setForm(f=>({...f,can_share:e.target.checked})), style:{marginTop:2,accentColor:'var(--accent)',cursor:'pointer',width:16,height:16} }),
          h('label', { htmlFor:'ob_share', style:{cursor:'pointer',fontSize:13,color:'var(--text)',lineHeight:1.5} },
            h('strong', null, 'Показывать мои контакты другим участникам'),
            h('div', { style:{fontSize:12,color:'var(--text-dim)',marginTop:2} }, 'Телефон и Telegram будут видны в базе участников')
          )
        ),
        h('div', { style:{display:'flex',gap:8} },
          h('button', { onClick:()=>setStep(1), style:{padding:'12px 16px',borderRadius:10,background:'var(--bg3)',color:'var(--text)',border:'1px solid var(--border)',cursor:'pointer',fontSize:14} }, '← Назад'),
          h('button', {
            onClick: submit, disabled: saving,
            style:{flex:1,padding:'12px',borderRadius:10,background:'var(--accent)',color:'white',border:'none',cursor:'pointer',fontSize:15,fontWeight:700}
          }, saving ? 'Сохранение...' : 'Войти в клуб')
        ),
        h('button', { onClick:onComplete, style:{background:'none',border:'none',color:'var(--text-dim)',fontSize:12,cursor:'pointer',textAlign:'center',width:'100%',marginTop:4} }, 'Пропустить, заполню позже')
      )
    )
  );
}

function App() {
  const [user,          setUser]          = useState(null);
  const [appLoading,    setAppLoading]    = useState(true);
  const [page,          setPage]          = useState('dashboard');
  const [currentLesson, setCurrentLesson] = useState(null);
  const [sidebarOpen,   setSidebarOpen]   = useState(false);
  const [dataVersion,   setDataVersion]   = useState(0);
  const [showOnboarding, setShowOnboarding] = useState(false);

  // Проверяем существующую сессию при загрузке страницы
  useEffect(() => {
    const token = getToken();
    if (!token) { setAppLoading(false); return; }
    api.get('/api/me')
      .then(res => {
        return loadApiData().then(() => { setUser(res.user); });
      })
      .catch(() => { clearToken(); })
      .finally(() => setAppLoading(false));
  }, []);

  if (appLoading) return h('div', { style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)',color:'var(--text-dim)',fontSize:'18px'} }, '⏳ Загрузка...');

  if (!user) return h(AuthPage, {
    onLogin: (userData) => {
      loadApiData().catch(()=>{});
      setUser(userData);
      // Показываем анкету если пользователь новый (нет города)
      api.get('/api/me/profile-data').then(r => {
        if (!r.data || !r.data.city) setShowOnboarding(true);
      }).catch(()=>{});
    }
  });

  // Показываем анкету онбординга
  if (showOnboarding) return h(OnboardingForm, {
    user,
    onComplete: () => setShowOnboarding(false)
  });

  const role = user?.role || 'student';

  const pages = {
    dashboard: { title: 'Главная', sub: 'Обзор активности в клубе' },
    knowledge: { title: 'База знаний', sub: LESSONS.length + ' уроков в ' + MODULES.length + ' разделах' },
    students:  { title: 'Участники клуба', sub: 'База участников' },
    contractors: { title: 'Проверенные подрядчики', sub: CONTRACTORS.length + ' партнёров с промокодами' },
    profile:   { title: 'Мой профиль', sub: 'Анкета и управление подпиской' },
    admin:     { title: 'Управление платформой', sub: 'Контент, подрядчики и участники' },
  };

  function handleLogout() {
    clearToken();
    setUser(null);
    setPage('dashboard');
    setCurrentLesson(null);
  }

  // Отметить урок просмотренным через API
  async function handleLessonComplete(lesson) {
    const newDone = !lesson.done;
    const local = LESSONS.find(l => l.id === lesson.id);
    if (local) local.done = newDone;
    recomputeModuleCounts();
    setCurrentLesson(prev => ({ ...prev, done: newDone }));
    setDataVersion(v => v + 1);
    try { await api.post('/api/lessons/' + lesson.id + '/watched', { watched: newDone }); }
    catch(e) { console.warn('Progress sync failed:', e.message); }
  }

  let pageContent;
  let topbarInfo = pages[page] || pages.dashboard;

  if (currentLesson) {
    topbarInfo = { title: currentLesson.title, sub: MODULES.find(m => m.id === currentLesson.moduleId)?.title };
    pageContent = h(LessonPlayer, {
      lesson: currentLesson,
      onBack: () => setCurrentLesson(null),
      onComplete: () => handleLessonComplete(currentLesson),
      onNext: (l) => setCurrentLesson(l),
      onPrev: (l) => setCurrentLesson(l),
    });
  } else if (page === 'admin' && role === 'admin') {
    pageContent = h(AdminContent, { onDataChange: () => setDataVersion(v => v + 1) });
  } else if (page === 'dashboard') {
    pageContent = h(Dashboard, { onNavigate: setPage, onLessonClick: setCurrentLesson, user, key: 'dash-' + dataVersion });
  } else if (page === 'knowledge') {
    pageContent = h(KnowledgeBase, { onLessonClick: setCurrentLesson, key: 'kb-' + dataVersion });
  } else if (page === 'students') {
    pageContent = h(StudentsBase);
  } else if (page === 'contractors') {
    pageContent = h(ContractorsBase);
  } else if (page === 'profile') {
    pageContent = h(Profile, { user });
  }

  return h('div', { className: 'app' },
    h(Sidebar, {
      page,
      role,
      user,
      onNavigate: (p) => { setPage(p); setCurrentLesson(null); },
      onLogout: handleLogout,
      open: sidebarOpen,
      onClose: () => setSidebarOpen(false),
    }),
    h('div', { className: 'main' },
      h(Topbar, { title: topbarInfo.title, sub: topbarInfo.sub, onMenuClick: () => setSidebarOpen(true) }),
      h('div', { className: 'content' }, pageContent)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
