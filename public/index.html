// ===== ADMIN: LESSON FILES ROW =====
function LessonFilesRow({ lesson, onSave }) {
  const [open, setOpen] = useState(false);
  const [newName, setNewName] = useState('');
  const [newUrl, setNewUrl] = useState('');
  const files = lesson.files || [];

  function addFile() {
    if (!newName.trim() || !newUrl.trim()) return;
    const url = newUrl.trim().startsWith('http') ? newUrl.trim() : 'https://' + newUrl.trim();
    lesson.files = [...files, { name: newName.trim(), url }];
    api.patch('/api/admin/lessons/' + lesson.id, { files: lesson.files }).catch(()=>{});
    setNewName(''); setNewUrl('');
    onSave();
  }

  function removeFile(i) {
    lesson.files = files.filter((_, idx) => idx !== i);
    api.patch('/api/admin/lessons/' + lesson.id, { files: lesson.files }).catch(()=>{});
    onSave();
  }

  return h('div', { className: 'admin-files-section' },
    files.length > 0 && h('div', { className: 'admin-files-list' },
      files.map((f, i) =>
        h('div', { key: i, className: 'admin-file-chip' },
          h('svg', { width:10, height:10, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2 },
            h('path', { d:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4' }),
            h('polyline', { points:'7 10 12 15 17 10' }),
            h('line', { x1:12, y1:15, x2:12, y2:3 })
          ),
          h('a', { href: f.url, target:'_blank', rel:'noopener' }, f.name),
          h('span', { className: 'admin-file-remove', onClick: () => removeFile(i) }, '✕')
        )
      )
    ),
    open && h('div', { className: 'admin-file-add-row' },
      h('input', { className:'admin-file-input', placeholder:'Название файла', value:newName, onChange:e=>setNewName(e.target.value), style:{maxWidth:120} }),
      h('input', { className:'admin-file-input', placeholder:'Ссылка на файл', value:newUrl, onChange:e=>setNewUrl(e.target.value) }),
      h('button', { className:'admin-file-add-btn', onClick:addFile }, '+ Добавить')
    ),
    h('div', { className:'admin-file-toggle', onClick:()=>setOpen(o=>!o) },
      h('svg', { width:10, height:10, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2.5 },
        open
          ? h('polyline', { points:'18 15 12 9 6 15' })
          : h('polyline', { points:'6 9 12 15 18 9' })
      ),
      open ? 'Скрыть' : (files.length > 0 ? 'Файлы (' + files.length + ')' : '+ Прикрепить файл')
    )
  );
}

// ===== ADMIN: ADD VIDEO MODAL =====
function AdminAddVideoModal({ onClose, onAdded }) {
  const [kId, setKId] = useState('');
  const [title, setTitle] = useState('');
  const [moduleId, setModuleId] = useState(MODULES[0].id);
  const [date, setDate] = useState(() => {
    const d = new Date();
    return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
  });
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');

  async function save() {
    if (!kId.trim() || !title.trim()) { setErr('Заполните Kinescope ID и название'); return; }
    setSaving(true); setErr('');
    const newLesson = {
      kinescopeId: kId.trim(),
      title: title.trim(),
      moduleId,
      duration: '—',
      date,
      views: 0,
      done: false,
      isNew: true,
      files: []
    };
    try {
      const res = await api.post('/api/admin/lessons', newLesson);
      newLesson.id = res.id || (Date.now());
    } catch(e) {
      newLesson.id = Date.now();
    }
    LESSONS.unshift(newLesson);
    recomputeModuleCounts();
    persistAdminChanges();
    onAdded();
    onClose();
  }

  return h('div', { className:'modal-backdrop', onClick:e=>{ if(e.target===e.currentTarget) onClose(); } },
    h('div', { className:'modal add-video-modal-inner' },
      h('button', { className:'modal-close', onClick:onClose },
        h('svg', {width:16,height:16,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},
          h('line',{x1:18,y1:6,x2:6,y2:18}), h('line',{x1:6,y1:6,x2:18,y2:18})
        )
      ),
      h('div', { className:'modal-hero', style:{textAlign:'left',padding:'1.5rem 2rem 1rem'} },
        h('div', { style:{fontSize:16,fontWeight:900,letterSpacing:'-0.3px'} }, 'Добавить видеоурок'),
        h('div', { style:{fontSize:12,color:'var(--text2)',marginTop:4} }, 'Введите Kinescope ID и параметры урока')
      ),
      h('div', { className:'add-video-form' },
        h('div', { className:'add-video-field' },
          h('label', { className:'add-video-label' }, 'Kinescope Video ID'),
          h('input', { className:'add-video-input', placeholder:'например: b0115c49-a6f1-466a-a893-acff9eebae10', value:kId, onChange:e=>setKId(e.target.value) })
        ),
        h('div', { className:'add-video-field' },
          h('label', { className:'add-video-label' }, 'Название урока'),
          h('input', { className:'add-video-input', placeholder:'Введите название...', value:title, onChange:e=>setTitle(e.target.value) })
        ),
        h('div', { className:'add-video-field' },
          h('label', { className:'add-video-label' }, 'Раздел'),
          h('select', { className:'add-video-input', value:moduleId, onChange:e=>setModuleId(e.target.value) },
            ...MODULES.map(m => h('option', { key:m.id, value:m.id }, m.title))
          )
        ),
        h('div', { className:'add-video-field' },
          h('label', { className:'add-video-label' }, 'Дата (дд.мм.гггг)'),
          h('input', { className:'add-video-input', placeholder:'27.03.2026', value:date, onChange:e=>setDate(e.target.value) })
        ),
        err && h('div', { style:{color:'var(--red)',fontSize:12,fontWeight:700} }, err),
        h('button', {
          className:'btn-primary',
          onClick:save,
          disabled:saving,
          style:{justifyContent:'center',width:'100%',padding:'0.85rem',fontSize:14}
        }, saving ? 'Сохранение...' : '+ Добавить урок')
      )
    )
  );
}

// ===== ADMIN: CONTENT MANAGEMENT =====
function AdminContent({ onDataChange }) {
  const [tab, setTab] = useState('lessons');
  const [search, setSearch] = useState('');
  const [moduleFilter, setModuleFilter] = useState('all');
  const [selected, setSelected] = useState(new Set());
  const [bulkTarget, setBulkTarget] = useState('');
  const [adminCounts, setAdminCounts] = useState({ students: null, contractors: null, lessons: null });

  useEffect(() => {
    api.get('/api/counts').then(r => setAdminCounts({ students: r.students, contractors: r.contractors, lessons: r.lessons })).catch(() => {});
  }, []);
  const [savedToast, setSavedToast] = useState(false);
  const [showAddModal, setShowAddModal] = useState(false);
  const [, forceUpdate] = useState(0);

  function showSavedToast() {
    setSavedToast(true);
    setTimeout(() => setSavedToast(false), 1800);
  }

  function commitChange() {
    recomputeModuleCounts();
    persistAdminChanges();
    forceUpdate(n => n + 1);
    onDataChange && onDataChange();
    showSavedToast();
  }

  function changeLessonModule(lessonId, newModuleId) {
    const idx = LESSONS.findIndex(l => l.id === lessonId);
    if (idx === -1) return;
    LESSONS[idx] = { ...LESSONS[idx], moduleId: newModuleId };
    // Синхронизируем с API
    api.patch('/api/admin/lessons/' + lessonId, { module_id: newModuleId }).catch(() => {});
    commitChange();
  }

  function renameLesson(lessonId, newTitle) {
    const idx = LESSONS.findIndex(l => l.id === lessonId);
    if (idx === -1) return;
    LESSONS[idx] = { ...LESSONS[idx], title: newTitle };
    // Синхронизируем с API
    api.patch('/api/admin/lessons/' + lessonId, { title: newTitle }).catch(() => {});
    persistAdminChanges();
    forceUpdate(n => n + 1);
    onDataChange && onDataChange();
  }

  function bulkMove() {
    if (!bulkTarget || selected.size === 0) return;
    const ids = [...selected];
    ids.forEach(id => {
      const idx = LESSONS.findIndex(l => l.id === id);
      if (idx !== -1) LESSONS[idx] = { ...LESSONS[idx], moduleId: bulkTarget };
    });
    // Синхронизируем bulk с API
    api.patch('/api/admin/lessons/bulk-move', { lesson_ids: ids, module_id: bulkTarget }).catch(() => {});
    setSelected(new Set());
    setBulkTarget('');
    commitChange();
  }

  function toggleSelect(id) {
    const next = new Set(selected);
    if (next.has(id)) next.delete(id);
    else next.add(id);
    setSelected(next);
  }

  function toggleSelectAll(visibleIds) {
    const allSelected = visibleIds.every(id => selected.has(id));
    const next = new Set(selected);
    if (allSelected) visibleIds.forEach(id => next.delete(id));
    else visibleIds.forEach(id => next.add(id));
    setSelected(next);
  }

  function resetAll() {
    if (!confirm('Сбросить все ваши изменения и вернуть исходные данные?')) return;
    localStorage.removeItem(STORAGE_KEY);
    LESSONS = DEFAULT_LESSONS.map(l => ({ ...l }));
    recomputeModuleCounts();
    forceUpdate(n => n + 1);
    onDataChange && onDataChange();
    showSavedToast();
  }

  // Filter lessons
  const filteredLessons = LESSONS.filter(l => {
    if (moduleFilter !== 'all' && l.moduleId !== moduleFilter) return false;
    if (search && !l.title.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const visibleIds = filteredLessons.map(l => l.id);
  const allVisibleSelected = visibleIds.length > 0 && visibleIds.every(id => selected.has(id));

  return h('div', { className: 'content-wide' },
    h('div', { className: 'admin-tabs' },
      h('button', { className: 'admin-tab ' + (tab === 'lessons' ? 'active' : ''), onClick: () => setTab('lessons') },
        h(Icon.video), 'Видеоуроки', h('span', { className: 'admin-tab-count' }, adminCounts.lessons ?? LESSONS.length)
      ),
      h('button', { className: 'admin-tab ' + (tab === 'contractors' ? 'active' : ''), onClick: () => setTab('contractors') },
        h(Icon.briefcase), 'Подрядчики', h('span', { className: 'admin-tab-count' }, adminCounts.contractors ?? CONTRACTORS.length)
      ),
      h('button', { className: 'admin-tab ' + (tab === 'students' ? 'active' : ''), onClick: () => setTab('students') },
        h(Icon.users), 'Участники', h('span', { className: 'admin-tab-count' }, adminCounts.students ?? '...')
      )
    ),

    tab === 'lessons' && h(React.Fragment, null,
      // Stats
      h('div', { className: 'admin-stats' },
        h('div', { className: 'admin-stat' },
          h('div', { className: 'admin-stat-label' }, 'Всего видео'),
          h('div', { className: 'admin-stat-value' }, LESSONS.length)
        ),
        h('div', { className: 'admin-stat' },
          h('div', { className: 'admin-stat-label' }, 'Разделов'),
          h('div', { className: 'admin-stat-value accent' }, MODULES.length)
        ),
        h('div', { className: 'admin-stat' },
          h('div', { className: 'admin-stat-label' }, 'Изменений'),
          h('div', { className: 'admin-stat-value' }, Object.keys(loadStorage().lessons || {}).length)
        ),
        h('div', { className: 'admin-stat' },
          h('div', { className: 'admin-stat-label' }, 'Найдено'),
          h('div', { className: 'admin-stat-value' }, filteredLessons.length)
        )
      ),

      // Toolbar
      h('div', { className: 'admin-toolbar' },
        h('div', { className: 'admin-search' },
          h(Icon.search),
          h('input', {
            placeholder: 'Поиск по названию урока...',
            value: search,
            onChange: e => setSearch(e.target.value)
          })
        ),
        h('select', {
          className: 'admin-filter-select',
          value: moduleFilter,
          onChange: e => setModuleFilter(e.target.value)
        },
          h('option', { value: 'all' }, 'Все разделы (' + LESSONS.length + ')'),
          ...MODULES.map(m =>
            h('option', { key: m.id, value: m.id }, m.title + ' (' + m.total + ')')
          )
        ),
        h('button', {
          className: 'btn-primary',
          onClick: () => setShowAddModal(true),
          style: { flexShrink: 0 }
        },
          h('svg', { width:14, height:14, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2.5 },
            h('line', { x1:12, y1:5, x2:12, y2:19 }), h('line', { x1:5, y1:12, x2:19, y2:12 })
          ),
          'Добавить видео'
        ),
        h('button', {
          className: 'btn-secondary',
          onClick: resetAll,
          title: 'Сбросить все изменения'
        },
          h(Icon.logout),
          'Сбросить'
        ),
      ),

      // Bulk action bar
      selected.size > 0 && h('div', { className: 'admin-bulk-bar' },
        h('div', { className: 'admin-bulk-count' }, 'Выбрано: ' + selected.size),
        h('div', { className: 'admin-bulk-actions' },
          h('select', {
            value: bulkTarget,
            onChange: e => setBulkTarget(e.target.value)
          },
            h('option', { value: '' }, 'Переместить в раздел...'),
            ...MODULES.map(m =>
              h('option', { key: m.id, value: m.id }, m.title)
            )
          ),
          h('button', {
            className: 'btn-primary',
            onClick: bulkMove,
            disabled: !bulkTarget,
            style: !bulkTarget ? { opacity: 0.5, pointerEvents: 'none' } : {}
          },
            h(Icon.check),
            'Применить'
          ),
          h('button', { className: 'admin-bulk-clear', onClick: () => setSelected(new Set()) }, 'Отменить')
        )
      ),

      // Table
      h('div', { className: 'admin-table' },
        h('div', { className: 'admin-table-head' },
          h('div', null,
            h('button', {
              className: 'admin-checkbox ' + (allVisibleSelected ? 'checked' : ''),
              onClick: () => toggleSelectAll(visibleIds)
            }, h(Icon.check))
          ),
          h('div', null, 'Превью'),
          h('div', null, 'Название урока'),
          h('div', null, 'Длит.'),
          h('div', null, 'Дата'),
          h('div', null, 'Раздел')
        ),
        filteredLessons.length === 0
          ? h('div', { className: 'admin-empty' }, 'Ничего не найдено')
          : filteredLessons.map(lesson =>
              h('div', {
                key: lesson.id,
                className: 'admin-row ' + (selected.has(lesson.id) ? 'selected' : '')

                h('button', {
                  className: 'admin-checkbox ' + (selected.has(lesson.id) ? 'checked' : ''),
                  onClick: () => toggleSelect(lesson.id)

                // Thumbnail
                h('div', { className: 'admin-thumb' },
                  lesson.kinescopeId
                    ? h('img', {
                        src: 'https://kinescope.io/' + lesson.kinescopeId + '/poster.jpg',
                        alt: lesson.title,
                        onError: e => { e.target.style.display='none'; e.target.nextSibling && (e.target.nextSibling.style.display='flex'); }
                      })
                    : null,
                  h('div', {
                    className: 'admin-thumb-fallback',
                    style: { display: lesson.kinescopeId ? 'none' : 'flex' }
                  },
                    h('svg', { viewBox:'0 0 24 24', fill:'currentColor' },
                      h('polygon', { points:'5 3 19 12 5 21 5 3' })
                    )
                  )
                ),

                // Title + description + files
                h('div', { className: 'admin-row-title' },

async function loadApiData() {
  const [mods, lsn] = await Promise.all([api.get('/api/modules'), api.get('/api/lessons')]);

  // Полностью заменяем MODULES данными из API
  MODULES.length = 0;
  mods.modules.forEach(m => {
    const slug = MODULE_SLUG_MAP[m.title] || m.slug || m.title;
    MODULES.push({
      id: slug,
      title: m.title,
      icon: MODULE_ICON_MAP[m.title] || 'book',
      total: m.lesson_count,
      done: 0,
    });
  });

  // Полностью заменяем LESSONS данными из API
  LESSONS.length = 0;
  lsn.lessons.forEach(l => {
    const mod = MODULES.find(m => m.title === (mods.modules.find(x => x.id === l.module_id)?.title));
    LESSONS.push({
      id:           l.id,            // Kinescope UUID
      kinescopeId:  l.id,            // плеер использует kinescopeId
      moduleId:     mod?.id || '',
      title:        l.title,
      description:  l.description || '',
      content_html: l.content_html || '',
      content_text: l.content_text || '',
      duration:     l.duration,
      duration_sec: l.duration_sec,
      embed_url:    l.embed_url,
      poster_url:   l.poster_url || '',
      isNew:        false,
      date:         l.created_at ? new Date(l.created_at).toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric'}) : '',
      views:        0,
    });
  });

  recomputeModuleCounts();
}

function App() {
  const [user,          setUser]          = useState(null);
  const [appLoading,    setAppLoading]    = useState(true);
  const [page,          setPage]          = useState('dashboard');
  const [currentLesson, setCurrentLesson] = useState(null);
  const [sidebarOpen,   setSidebarOpen]   = useState(false);
  const [dataVersion,   setDataVersion]   = useState(0);
  const [showOnboarding, setShowOnboarding] = useState(false);
  const [navCounts,     setNavCounts]     = useState(null);

  function fetchCounts() {
    api.get('/api/counts').then(r => setNavCounts(r)).catch(() => {});
  }

  // Проверяем существующую сессию при загрузке страницы
  useEffect(() => {
    const token = getToken();
    if (!token) { setAppLoading(false); return; }
    api.get('/api/me')
      .then(res => {
        return loadApiData().then(() => { setUser(res.user); fetchCounts(); });
      })
      .catch(() => { clearToken(); })
      .finally(() => setAppLoading(false));
  }, []);

  if (appLoading) return h('div', { style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)',color:'var(--text-dim)',fontSize:'18px'} }, '⏳ Загрузка...');

  if (!user) return h(AuthPage, {
    onLogin: (userData) => {
      loadApiData().catch(()=>{});
      setUser(userData);
      fetchCounts();
      // Показываем анкету если пользователь новый (нет города)
      api.get('/api/me/profile-data').then(r => {
        if (!r.data || !r.data.city) setShowOnboarding(true);
      }).catch(()=>{});
    }
  });

  // Показываем анкету онбординга
  if (showOnboarding) return h(OnboardingForm, {
    user,
    onComplete: () => setShowOnboarding(false)
  });

  const role = user?.role || 'student';

  const pages = {
    dashboard: { title: 'Главная', sub: 'Обзор активности в клубе' },
    knowledge: { title: 'База знаний', sub: LESSONS.length + ' уроков в ' + MODULES.length + ' разделах' },
    students:  { title: 'Участники клуба', sub: 'База участников' },
    contractors: { title: 'Проверенные подрядчики', sub: (navCounts?.contractors ?? CONTRACTORS.length) + ' партнёров' },
    profile:   { title: 'Мой профиль', sub: 'Анкета и управление подпиской' },
    admin:     { title: 'Управление платформой', sub: 'Контент, подрядчики и участники' },
  };

  function handleLogout() {
    clearToken();
    setUser(null);
    setPage('dashboard');
    setCurrentLesson(null);
  }

  // Отметить урок просмотренным через API
  async function handleLessonComplete(lesson) {
    const newDone = !lesson.done;
    const local = LESSONS.find(l => l.id === lesson.id);
    if (local) local.done = newDone;
    recomputeModuleCounts();
    setCurrentLesson(prev => ({ ...prev, done: newDone }));
    setDataVersion(v => v + 1);
    try { await api.post('/api/lessons/' + lesson.id + '/watched', { watched: newDone }); }
    catch(e) { console.warn('Progress sync failed:', e.message); }
  }

  let pageContent;
  let topbarInfo = pages[page] || pages.dashboard;

  if (currentLesson) {
    topbarInfo = { title: currentLesson.title, sub: MODULES.find(m => m.id === currentLesson.moduleId)?.title };
    pageContent = h(LessonPlayer, {
      lesson: currentLesson,
      onBack: () => setCurrentLesson(null),
      onComplete: () => handleLessonComplete(currentLesson),
      onNext: (l) => setCurrentLesson(l),
      onPrev: (l) => setCurrentLesson(l),
    });
  } else if (page === 'admin' && role === 'admin') {
    pageContent = h(AdminContent, { onDataChange: () => { setDataVersion(v => v + 1); fetchCounts(); } });
  } else if (page === 'dashboard') {
    pageContent = h(Dashboard, { onNavigate: setPage, onLessonClick: setCurrentLesson, user, key: 'dash-' + dataVersion });
  } else if (page === 'knowledge') {
    pageContent = h(KnowledgeBase, { onLessonClick: setCurrentLesson, key: 'kb-' + dataVersion });
  } else if (page === 'students') {
    pageContent = h(StudentsBase);
  } else if (page === 'contractors') {
    pageContent = h(ContractorsBase);
  } else if (page === 'profile') {
    pageContent = h(Profile, { user });
  }

  return h('div', { className: 'app' },
    h(Sidebar, {
      page,
      role,
      user,
      counts: navCounts,
      onNavigate: (p) => { setPage(p); setCurrentLesson(null); },
      onLogout: handleLogout,
      open: sidebarOpen,
      onClose: () => setSidebarOpen(false),
    }),
    h('div', { className: 'main' },
      h(Topbar, { title: topbarInfo.title, sub: topbarInfo.sub, onMenuClick: () => setSidebarOpen(true) }),
      h('div', { className: 'content' }, pageContent)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
